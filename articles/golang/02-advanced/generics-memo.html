# Go 泛型 记忆法（速记版）

> ## 🧠 只需要记这一行
>
> **Go 1.18+ 泛型 = 编译期类型参数化**：`[T any]` 类型参数 + **约束（interface 升级成"类型集"，`union` + `~T` 底层类型）**；实现用 **GC Shape Stenciling（同 shape 共享代码 + dictionary 传差异）**，性能 ≈ 直接调用（~1.3×）。容器/算法用泛型，业务别滥用。

记不全时，按这条**记忆主线：语法 + 约束 + 实现 + 四个限制**展开（详细推演看[正文](generics.html)）：

---

## 🔤 语法 —— 类型参数 [T]

```go
func Map[T, U any](s []T, f func(T) U) []U { ... }   // 泛型函数, 调用时类型推导
type Stack[T any] struct { items []T }                // 泛型类型
func (s *Stack[T]) Push(v T) { s.items = append(s.items, v) }
```
- 取零值：`var zero T`。实例化：`Stack[int]{}`。

## 🔒 约束 —— interface 升级成"类型集"

```go
T any           // 任何类型(最弱)
T comparable    // 支持 ==/!=（不含 slice/map/func）

type Number interface { int | int64 | float32 | float64 }  // union 类型集
type IntegerLike interface { ~int }                         // ~T = 底层类型是 T 的所有类型(含 MyInt)
```
- 标准库：`cmp.Ordered`(1.21+ 可比大小)；旧 `golang.org/x/exp/constraints`: Signed/Unsigned/Integer/Float/Ordered。

## ⚙️ 实现 —— GC Shape Stenciling

```text
完全特化(C++模板)：每类型一份代码 → 代码爆炸
完全擦除(Java)   ：擦类型全用 Object → 装箱+类型丢失
GC Shape(Go)    ：同 GC shape(大小+指针布局)共享一份代码
```
- 同 shape 共享：所有非指针 8 字节(int/int64/float64) 一份、所有指针类型一份、string 一份。
- 用 **dictionary** 传类型差异：T 的类型描述符 / 方法表 / 元数据 → 字典查找带来 ~1.3× 小开销（简单 +/-/比较 零开销）。

## ⚠️ 四个限制

```text
① 不支持泛型方法（method 不能引入新 T）→ 改写成函数 Map[T,U]
② 类型参数不能 type switch → switch any(v).(type)
③ 运行时拿不到 T（泛型是编译期机制）→ 要查得自己 reflect
④ 当 map key 的 T 必须 comparable
```
- 性能对比：直接 1× / 泛型 1~1.3× / interface 2~5× / reflect 50~100×。
- 标准库工具(1.21+)：`slices.Sort/Contains/Index/Equal/Clone`、`maps.Keys/Values/Clone`、`cmp.Compare`。
- 选型：任何 T 都适用的容器/算法 → 泛型；只服务 2-3 种 → 写具体函数；运行时才知类型 → reflect。
