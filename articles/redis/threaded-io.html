# Redis 6 里的 Threaded I/O 是想解决什么问题?

> 一句话：Redis 6.0 的 Threaded I/O（多线程 I/O）只把"读 socket + 协议解析 / 写 socket"这部分**网络 I/O** 交给多个 I/O 线程并行处理，**命令的执行依然是单线程**——它解决的是网络收发成为瓶颈的问题，而不是把 Redis 变成多线程执行命令。

---

## 一、先回顾：Redis 一直说自己"单线程"，到底指什么?

这里要先把概念掰清楚，否则后面全乱。

**"单线程"特指：命令的执行是单线程的。** 即所有读写命令（GET/SET/INCR/LPUSH…）都由**一个主线程**串行执行，基于 **Reactor 模式 + I/O 多路复用（Linux 上是 epoll）** 的事件循环（`aeMain`）来驱动。

> 注意：Redis 从来都不是只有一个线程的进程。早在 4.0 就有 BIO 后台线程做异步删除（`UNLINK`/`lazyfree`）、AOF 刷盘、关闭文件等。这里讨论的"单线程"只针对**主流程：网络事件处理 + 命令执行**。

### 为什么单线程也能这么快?

| 原因 | 说明 |
|---|---|
| **纯内存操作** | 数据都在内存里，单条命令的执行通常是微秒级，CPU 算得飞快。 |
| **避免锁竞争** | 单线程执行命令，天然没有共享数据的并发问题，**不需要加锁**，省掉锁开销和死锁风险。 |
| **避免上下文切换** | 没有多线程来回切换、没有 CPU 缓存来回失效，执行路径稳定。 |
| **高效的数据结构** | SDS、ziplist/listpack、跳表、渐进式 rehash 等都为单线程下的低延迟设计。 |
| **I/O 多路复用** | 一个线程靠 epoll 同时盯着成千上万个连接，事件就绪才处理。 |

**核心结论：Redis 的瓶颈通常不在 CPU（命令执行），而在内存大小和网络 I/O。** 既然瓶颈不在 CPU，多线程执行命令带来的并发安全成本（加锁）就不划算——这正是 Redis 长期坚持单线程执行的根本理由。

---

## 二、那瓶颈到底卡在哪里?

单线程执行命令本身很快，但主线程在一次事件循环里要做的事不止"执行命令"。把一条请求的生命周期拆开看：

```text
一条命令在主线程里要经历的几步：

 ① read()  从 socket 读字节      ← 系统调用 + 数据拷贝（内核态→用户态）
 ② parse   解析 RESP 协议         ← CPU 解析，大请求时不便宜
 ③ execute 真正执行命令           ← 纯内存操作，通常最快
 ④ 构造回包  按 RESP 编码 reply    ← CPU 编码
 ⑤ write() 把结果写回 socket      ← 系统调用 + 数据拷贝（用户态→内核态）
```

关键观察：**①②④⑤ 都属于"网络 I/O + 协议编解码"，③ 才是命令执行。**

在**高并发**或**大 value（大 key / 大批量）** 场景下，主线程花在 ①②④⑤ 上的时间占比会非常高——尤其是 `read`/`write` 系统调用和数据拷贝。结果就是：**网络 I/O 把执行命令的时间给挤占了**，主线程明明算得很快，却被收发数据拖住，吞吐上不去。

```text
单线程模型下主线程的时间分布（高并发 / 大 value 时）：

 ┌─────────────────────────────────────────────────────────┐
 │ read+parse │ read+parse │ exec │ encode+write │ ...       │
 └─────────────────────────────────────────────────────────┘
   ↑ 网络 I/O 占了一大块，真正 exec 的时间反而很少
```

**这就是 Threaded I/O 要解决的问题：把被网络 I/O 挤占的主线程时间释放出来。**

---

## 三、Threaded I/O（Redis 6.0）到底做了什么?

一句话：**把网络 I/O（读 socket + 协议解析、编码 + 写 socket）拆出去，交给多个 I/O 线程并行做；命令的执行仍然留在主线程，依旧单线程。**

```text
                       ┌──────────── 主线程 (main thread) ─────────────┐
                       │  · accept 新连接                              │
                       │  · 事件循环 aeMain / epoll                     │
                       │  · ★ 串行执行所有命令（仍然单线程，无需加锁）  │
                       └────────────────────────────────────────────────┘
                            ▲ 分发 client          ▲ 分发回包
              ┌─────────────┼──────────────┐       │
              ▼             ▼              ▼        ▼
        ┌──────────┐  ┌──────────┐   ┌──────────┐
        │ I/O 线程1 │  │ I/O 线程2 │ … │ I/O 线程N │   并行做：
        │ read+parse│  │ read+parse│   │ read+parse│   读 socket + 解析协议
        │  write    │  │  write    │   │  write    │   编码 + 写 socket
        └──────────┘  └──────────┘   └──────────┘
```

为什么命令执行不并行? 因为**只要执行单线程，就不存在多个线程同时改同一份数据的问题**，Redis 的数据结构和命令实现完全不用加锁，保持了原来的原子性与简单性。多线程只用在"无共享数据冲突"的网络收发上，是一种很克制的取舍。

> 注意：主线程在 I/O 线程干活时也会**自己分担一份** I/O（不是纯调度者），并通过自旋忙等待所有 I/O 线程完成，再统一进入执行阶段。

---

## 四、完整流程（一轮事件循环里发生了什么）

```text
 step 1  主线程 accept 新连接，并把"本轮有可读事件 / 待写出"的 client
         先攒进一个待处理队列（clients_pending_read / clients_pending_write）。

 step 2  主线程把队列里的 client 以 Round-Robin 方式轮流分给各 I/O 线程
         （主线程自己也算其中一个 worker，分到一份）。

 step 3  ┌── I/O 线程1 ──┐ ┌── I/O 线程2 ──┐ ┌── I/O 线程N ──┐
         │ read + parse │ │ read + parse │ │ read + parse │   ← 并行！
         └──────┬───────┘ └──────┬───────┘ └──────┬───────┘
                └──────── 主线程自旋忙等，直到全部解析完 ───────┘

 step 4  主线程拿到所有已解析好的请求，★ 串行逐个执行命令（单线程）。
         执行结果先写进各 client 的输出缓冲区（reply buffer）。

 step 5  ┌── I/O 线程1 ──┐ ┌── I/O 线程2 ──┐ ┌── I/O 线程N ──┐
         │   write back │ │   write back │ │   write back │   ← 并行！
         └──────────────┘ └──────────────┘ └──────────────┘
         把回包并行 write 回各自负责的 socket。

 step 6  收尾，进入下一轮事件循环。
```

**记牢这条主线：并行（读+解析）→ 串行（执行）→ 并行（写回）。** 中间夹着的"执行"始终是单线程，这是整个设计的安全基石。

---

## 五、配置怎么开

Threaded I/O 默认**关闭**，需要在 `redis.conf` 里显式打开：

```conf
# 1) I/O 线程数（含主线程在内的并行度）
#    官方建议：不要超过物理核数；4 核机器建议设 2~3，
#    8 核机器最多 8。设为 1 即关闭多线程 I/O（默认）。
io-threads 4

# 2) 是否让 I/O 线程也负责"读 + 解析请求"
#    默认 no：只在【写回 socket】这一步用多线程，
#    读取/解析仍由主线程做。
#    设为 yes 才会把【读 + parse】也交给 I/O 线程并行。
io-threads-do-reads yes
```

要点：

- `io-threads` **大于 1** 才真正启用多线程 I/O。
- 默认情况下（只开 `io-threads`）**只多线程化"写回"**；因为官方测试发现多线程写回收益最明显，而多线程读取收益相对有限。
- 想连"读 + 解析"也并行，必须**额外**把 `io-threads-do-reads` 设为 `yes`。
- 官方明确建议：**线程数不要超过 CPU 核数**，否则线程间争抢反而变慢。低负载机器不建议开。

---

## 六、最容易答错的关键认知

> 这一节是面试的"送命题区"，务必说准。

1. **它解决的是网络 I/O，不是 CPU / 命令执行。** Redis 的命令执行从 6.0 到现在依然是单线程。Threaded I/O 加速的是 read/parse/write 这些被 syscall 和拷贝拖慢的环节。
2. **命令仍单线程 → 没有并发安全问题。** 因为没有两个线程同时执行命令、同时改数据，所以**不需要加锁**，原子性天然保持，Lua 脚本、事务（MULTI/EXEC）的语义都不受影响。
3. **不要说"Redis 6 变成多线程了 / 能并发执行命令了"。** 这是最常见的错误说法。正确说法是"Redis 6 引入了多线程的网络 I/O，命令执行仍单线程"。
4. **不是默认开启。** 不配 `io-threads` 就还是老的单线程 I/O 模型。

| 误区说法（❌） | 准确说法（✅） |
|---|---|
| Redis 6 把命令执行改成多线程了 | 命令执行仍是单线程，只有网络 I/O 多线程 |
| 多线程所以要加锁保证安全 | 执行单线程，无共享冲突，**不需要加锁** |
| 开了就能线性提升 QPS | 只在网络 I/O 是瓶颈时有效，小命令/低并发收益小 |
| 默认就开着 | 默认关闭，需手动配 `io-threads` |

---

## 七、对比 memcached：同样要多线程，为什么取舍不同?

| 维度 | memcached | Redis 6 Threaded I/O |
|---|---|---|
| 多线程范围 | **连网络 I/O 带数据操作都多线程** | **只有网络 I/O 多线程，命令执行单线程** |
| 是否加锁 | 需要：多线程同时操作数据，靠**全局锁 / 分段锁（item lock 等）** 保护 | **不需要**：执行单线程，无共享数据竞争 |
| 数据结构 | 主要是简单 KV，加锁代价相对可控 | 数据结构丰富（list/hash/zset…），若多线程执行需大量细粒度锁，复杂且易错 |
| 设计取舍 | 用锁换 CPU 并行 | 用"I/O 并行 + 执行串行"绕开锁 |

memcached 很早就用多线程跑满多核，但代价是要用锁保护数据。Redis 选择了一条更克制的路：**把"会冲突"的执行留在单线程（免锁），只把"不冲突"的网络收发并行化**——既吃到多核红利，又保住了无锁、原子、实现简单的优点。

---

## 八、什么时候有用 / 什么时候收益不大

**适合开启（收益明显）：**

- 单实例 QPS 很高，CPU 单核已接近打满，且 `perf` 显示大量时间花在网络 syscall / 拷贝上。
- value 较大、批量命令多（如 `MGET`/`MSET` 大批量、pipeline 大包），编解码 + 收发开销重。
- 多核机器有空闲核可用。

**收益不大甚至变差（不建议开）：**

- 命令都很小、并发不高 → 网络 I/O 本就不是瓶颈，开了线程调度/自旋等待反而增加开销。
- 机器核数少（如 1~2 核）→ 没有富余核，线程争抢得不偿失。
- 瓶颈在内存、在大 key 阻塞、在慢命令（如 `KEYS *`、大 `O(n)` 操作）→ 这些是执行层问题，Threaded I/O **帮不上忙**，该优化命令、拆大 key、加分片。

> 经验：先用 `redis-cli --intrinsic-latency`、`INFO`、`perf` 判断瓶颈是否真在网络 I/O，再决定开不开，并务必压测对比。

---

## 一句话总结

> **Redis 6.0 的 Threaded I/O 用多个 I/O 线程并行处理"读 socket + 协议解析 / 编码 + 写 socket"这部分网络 I/O，而命令执行始终保持单线程（因此无需加锁、保持原子性）；它解决的是高并发 / 大 value 下网络 I/O 成为瓶颈的问题，默认关闭，需配 `io-threads`（建议不超核数）并按需打开 `io-threads-do-reads`——切勿误解为"Redis 改成多线程执行命令"。**
