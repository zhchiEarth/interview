# 四种订阅模式

> 一句话：Pulsar 把「谁来消费、怎么分发、是否保序」全收进**服务端的 Subscription 对象**里，靠四种订阅模式（Exclusive / Failover / Shared / Key_Shared）在同一套引擎上统一了「队列」和「流」两种语义。

## 一、前提：Subscription 是服务端有状态对象

先把三个概念摆清楚：

```text
                       ┌─ Subscription: risk   （游标在 msg-108）
Topic: order_paid ─────┼─ Subscription: notify （游标在 msg-95）
                       └─ Subscription: settle （游标在 msg-103）
                            ▲
                            └─ 每个订阅下可挂 1~N 个 Consumer，挂法由「订阅模式」决定
```

- **一个 Topic 可被多个 Subscription 同时订阅**，互不影响——风控、通知、清结算各建一个订阅，各自一份进度。
- **Subscription 是 Broker 端的有状态对象**，核心状态是消费游标 **Cursor**（消费到哪了），持久化在 BookKeeper（细节见 [BookKeeper 存储原理](bookkeeper.html)）。Consumer 只是临时连上来的「读取者」，断开重连进度不丢。
- **订阅模式决定「同一个订阅里多个 Consumer 怎么分活」**：是只许一个独占，还是主备切换，还是并发分摊，还是按 Key 分摊。

> 关键：模式是**订阅级别**的属性，不是 Topic 级别。同一个 Topic，A 订阅用 Shared、B 订阅用 Failover，完全合法——这正是 Pulsar「队列 + 流统一」的根。

## 二、Exclusive（独占）—— 默认

```text
Subscription(Exclusive)
   └─ Consumer-1  ✅ 消费中
   └─ Consumer-2  ❌ 连上即报错（ConsumerBusy）
```

| 维度 | 说明 |
|------|------|
| Consumer 数 | **只允许 1 个**，第 2 个连上直接报错 |
| 顺序 | 严格保序（单消费者天然有序） |
| 分发 | 无所谓分发，全给唯一 Consumer |
| 吞吐 | 受限于单消费者 |
| 场景 | 默认模式；要求严格顺序、单点处理；调试 / 单线程消费 |

## 三、Failover（故障转移）—— 主备保序

可以挂多个 Consumer，但**同一时刻只有一个 Active 在消费**，其余 Standby 待命；Active 挂了，Broker 自动把流量切给下一个。

```text
Subscription(Failover) on partition-0
   └─ Consumer-1  ✅ Active   ← 当前消费
   └─ Consumer-2  ⏸ Standby
   └─ Consumer-3  ⏸ Standby

Consumer-1 掉线 ─────────────►  Consumer-2 升为 Active 接着消费
```

| 维度 | 说明 |
|------|------|
| Consumer 数 | 多个，但只有 1 个 Active |
| 顺序 | **分区级保序**（同一分区始终被一个 Active 顺序消费） |
| 分发 | 全量给 Active，主挂切备 |
| 吞吐 | 单分区受限于 Active；分区 Topic 下不同分区可分给不同 Consumer 做 Active，整体并行 |
| 场景 | 要顺序又要高可用，不想停机；典型「主备热切换」 |

> 对分区 Topic，Failover 会把不同 partition 的 Active 分散到不同 Consumer 上，既保「分区内有序」又获得「分区间并行」。

## 四、Shared（共享）—— 高吞吐无序

多个 Consumer 同时活跃，Broker 把消息**逐条 round-robin 轮流分发**给它们。这就是传统消息队列的「工作队列」模式。

```text
                        ┌─► Consumer-1   m1 m4 m7
Subscription(Shared) ───┼─► Consumer-2   m2 m5 m8     ← round-robin 逐条分发
                        └─► Consumer-3   m3 m6 m9
```

| 维度 | 说明 |
|------|------|
| Consumer 数 | 多个，全部并发消费 |
| 顺序 | **不保证顺序**（同一 Key 可能落到不同 Consumer） |
| 分发 | round-robin 逐条分发 |
| Ack | **只能单条 ack**（individual），不支持累积 ack |
| 吞吐 | 高，加 Consumer 直接扩容 |
| 场景 | 顺序无所谓、要榨吞吐：通知推送、日志处理、任务分发 |

## 五、Key_Shared（按键共享）—— 顺序与扩展兼得

Shared 的「升级版」：按消息的 **Key 哈希**把消息固定路由到某个 Consumer，于是**同一个 Key 的所有消息总落到同一个 Consumer、保持有序**，同时不同 Key 分散到多个 Consumer 并行处理。

```text
hash(key) 决定落点：

key=A ─┐
key=D ─┴─► Consumer-1   （A、D 的消息在此严格有序）
key=B ────► Consumer-2   （B 有序）
key=C ────► Consumer-3   （C 有序）
```

| 维度 | 说明 |
|------|------|
| Consumer 数 | 多个并发 |
| 顺序 | **同 Key 有序**（跨 Key 无序） |
| 分发 | 按 Key 哈希固定路由 |
| 吞吐 | 高，且 Key 维度可水平扩展 |
| 场景 | 既要扩展又要「同一实体顺序处理」：同一订单/用户/账户的事件按序，不同实体并行 |

> 注意：Consumer 增减会触发 Key 到 Consumer 的重新分配，期间为保序可能短暂阻塞相关 Key 的投递。可配固定哈希范围（sticky）来缓解。

## 六、四种模式对比

| 模式 | Consumer 数 | 顺序保证 | 分发方式 | 吞吐 | 典型场景 |
|------|------------|---------|---------|------|---------|
| **Exclusive** | 仅 1 | 严格有序 | 独占 | 低 | 默认 / 单点严格顺序 |
| **Failover** | 多（1 Active） | 分区级有序 | 主备切换 | 中（分区可并行） | 顺序 + 高可用主备 |
| **Shared** | 多并发 | 不保证 | round-robin 逐条 | 高 | 任务分发 / 高吞吐无序 |
| **Key_Shared** | 多并发 | 同 Key 有序 | Key 哈希路由 | 高 | 同实体保序 + 并行扩展 |

记忆法：**独占 → 主备 → 群分 → 按键群分**，顺序保证从「最强」逐步换吞吐，到 Key_Shared 又把顺序「按 Key 补回来」。

## 七、对比 Kafka 的 Consumer Group

```text
Kafka：一个 partition 在一个 group 内只能被一个 consumer 消费
        并发度受 partition 数硬约束；Group 同时只表达一种语义

Pulsar：并发度与分区解耦（Shared/Key_Shared 下多 consumer 抢一个分区）
        同一 Topic 可被不同订阅以不同模式消费 → 队列 + 流统一
```

- Kafka 的 Consumer Group 把「订阅 + 分发」绑死成一种语义：分区数即并发上限，且基本是「按分区保序」。要「多消费者并发 + 同 Key 保序」，Kafka Group 做不到。
- Pulsar 把模式做成订阅的可选项：**同一 Topic 可以被 risk 订阅用 Key_Shared、被 audit 订阅用 Exclusive 同时消费**，互不干扰。一套引擎既当「队列」（Shared）又当「流」（Failover 分区保序），这是 Pulsar 相对 Kafka 最显眼的灵活性。更多见 [Pulsar vs Kafka](vs-kafka.html)。

> 投递闭环（流控 / Ack / 重投 / 死信）见下一篇 [消息投递：Ack / Cursor / 重投 / 死信](consumption.html)；整体地图见 [Pulsar 渐进式理解](deep-dive-overview.html)。

## 一句话总结

> 订阅模式是挂在**服务端有状态 Subscription** 上的属性：Exclusive 独占严格有序、Failover 主备分区保序、Shared round-robin 高吞吐无序、Key_Shared 按 Key 哈希做到「并行 + 同 Key 有序」——一个 Topic 能被多个订阅以不同模式同时消费，于是 Pulsar 用一套引擎统一了队列与流。
