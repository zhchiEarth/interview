# MySQL 索引原理

> 一句话：索引是一种**排好序的数据结构**，用空间和写入代价换取查找速度；InnoDB 用 **B+ 树**做索引，因为它矮胖（三四层撑千万行）、叶子节点存数据且用双向链表串起来，既能等值查也能范围查/排序，且节点大小贴着磁盘页（默认 16KB）从而把磁盘 IO 压到最少。

> 本文默认讨论 **MySQL InnoDB 存储引擎**（默认引擎），涉及其它引擎或版本差异处会显式标注。相关：[事务与隔离级别](transaction.html)。

## 一、为什么要索引

没有索引时，按条件查一行数据只能**全表扫描**：从第一行逐行比对到最后一行。表有一千万行，命中与否都得把一千万行从磁盘读进来比一遍——慢在**磁盘 IO**。

```text
SELECT * FROM user WHERE name = 'tom';

无索引:  row1 → row2 → row3 → ... → row10000000   (全表逐行扫描,大量随机 IO)
有索引:  在排好序的结构里二分/树形定位 → 几次 IO 直达        (查找次数 ~ log 级)
```

索引的本质：**用额外的存储空间维护一份排好序的数据结构**，把"逐行扫描"变成"有序结构里的定位"。代价是占空间、且每次增删改都要同步维护索引（写变慢），所以索引不是越多越好。

## 二、为什么是 B+ 树

要把数据"排好序并支持快速定位"，候选结构很多，逐个排除：

| 结构 | 等值查 | 范围查 / 排序 | 问题 |
|---|---|---|---|
| 哈希表 | O(1) 很快 | **不支持** | 哈希打散后无序，`>`、`<`、`ORDER BY`、`LIKE 'a%'` 全废；只适合精确等值 |
| 二叉搜索树 | O(log n) | 支持 | 可能退化成链表；即使平衡，**树太高** |
| 红黑树 / 平衡二叉树 | O(log n) | 支持 | 每个节点只有 2 个孩子 → 千万级数据树高几十层 → **几十次磁盘 IO** |
| B 树 | O(log n) | 支持 | 比二叉树矮很多，但**非叶子节点也存数据** → 单节点能放的键变少 → 树更高；范围查要中序回溯，不连续 |
| **B+ 树** | O(log n) | **很好** | InnoDB 的选择，见下 |

**磁盘 IO 是瓶颈**：内存按字节寻址快，磁盘按"块/页"读，一次 IO 读一页。结构越"矮胖"（每个节点孩子越多、树越矮），从根走到叶子需要的 IO 次数就越少。

B+ 树相对 B 树的关键改进，正是为"矮胖 + 范围友好"服务的：

- **非叶子节点只存键 + 指针，不存数据** → 同样大小的一个节点能容纳更多的键 → 扇出（fan-out）更大 → 树更矮。InnoDB 一个节点 ≈ 一个数据页（默认 **16KB**），三到四层就能索引千万级行。
- **所有数据都在叶子节点**，且叶子节点之间用**双向链表**首尾相连 → 范围查询 / 排序时，定位到起点后**顺着链表顺序扫描**即可，不必回到上层节点中序回溯。
- 节点大小对齐磁盘页 → 一次 IO 正好读一个节点，**IO 利用率最高**。

```text
为什么矮胖很关键(直觉):
   红黑树(2 叉)   :  千万行 ≈ 23 层  → 最坏 23 次磁盘 IO
   B+ 树(每节点上百~上千扇出): 千万行 ≈ 3~4 层 → 3~4 次磁盘 IO(且根/枝常驻内存)
```

## 三、B+ 树结构图

```text
                       [非叶子节点:只存 键 + 指向下层的指针]
                        ┌───────────────────────────┐
                        │   10   │   35   │   68     │           ← 根
                        └──┬─────────┬────────┬──────┘
                 ┌─────────┘         │        └─────────┐
                 ▼                   ▼                  ▼
        ┌────────────┐      ┌────────────┐     ┌────────────┐
        │ 4 │ 7 │ 10 │      │ 20 │ 35 │   │     │ 50 │ 68 │   │    ← 内部层(仍只存键+指针)
        └──┬───┬───┬─┘      └──┬───┬─────┘     └──┬───┬──────┘
           ▼   ▼   ▼  ...
   [叶子节点:存 键 + 真实数据;叶子之间双向链表相连]

   ┌──────────┐   ┌──────────┐   ┌──────────┐   ┌──────────┐
   │ 4 :row   │◄─►│ 7 :row   │◄─►│ 10:row   │◄─►│ 20:row   │ ◄─► ...
   └──────────┘   └──────────┘   └──────────┘   └──────────┘
      ▲ 范围查询/排序: 定位到起点后顺着 ◄─► 链表扫,无需回上层
```

要点速记：

- 非叶子节点 = **键 + 指针**（路由用，不含数据），所以扇出大、树矮。
- 叶子节点 = **键 + 数据**（InnoDB 中具体存什么取决于聚簇/二级，见下节），且**双向链表**串联。
- 数据只在叶子层，因此从根到任意数据的路径长度相同（查询性能稳定）。

## 四、InnoDB 是索引组织表：聚簇索引 vs 二级索引

InnoDB 的表数据本身就是按主键组织的一棵 B+ 树，这叫**索引组织表（IOT）**。表怎么存，取决于主键索引——即**聚簇索引**。

**聚簇索引（clustered index）**：以主键构建的 B+ 树，**叶子节点直接存放整行数据**。所以"找到主键 = 找到整行"。一张表只有一个聚簇索引（数据只能按一种顺序物理排列一次）。

```text
聚簇索引(主键): 叶子 = 整行
   ... → [ id=10 | name,age,addr...(整行) ] → ...
```

主键的选取规则：有显式主键就用主键；没有主键就用第一个**非空唯一索引**；再没有，InnoDB 自动生成一个隐藏的 6 字节 `ROW_ID` 作为聚簇键。

**二级索引（secondary index，又叫辅助/非聚簇索引）**：在主键之外的列上建的索引，也是一棵 B+ 树，但**叶子节点存的是索引列 + 该行的主键值**，而**不是整行数据**。

```text
二级索引(如 name 上的索引): 叶子 = 索引列 + 主键值
   ... → [ name='tom' | id=10 ] → ...
                          └── 只存主键,不存整行
```

为什么二级索引叶子只存主键、不存整行？避免每个二级索引都冗余一份完整数据；行更新时也只需维护聚簇索引里的那份数据。代价就是下面的"回表"。

## 五、回表

通过**二级索引**查询、但又需要索引里没有的列时，要走两步：

```text
SELECT * FROM user WHERE name = 'tom';   -- name 上有二级索引

第 1 步: 在 name 的二级索引 B+ 树里找到 'tom'  → 拿到主键 id=10
第 2 步: 拿 id=10 回到聚簇索引 B+ 树,再查一次  → 取出整行
         ▲ 这第二次查询就叫「回表」(back to table)

   [二级索引]                     [聚簇索引]
   name='tom' ─→ id=10  ──回表──→  id=10 ─→ 整行(name,age,addr...)
```

回表 = 多走一棵 B+ 树、多一轮 IO。一次查询如果命中很多行、每行都回表，开销会被放大。如何避免？见覆盖索引。

## 六、覆盖索引

如果一个查询**需要的列，全部都在使用的索引里**（包括二级索引叶子自带的主键），那么在索引 B+ 树里就能取到所有数据，**不需要回表**——这叫**覆盖索引（covering index）**。

```sql
-- name 上有二级索引,二级索引叶子天然带着主键 id
-- 要的列 (id, name) 都在索引里 → 覆盖索引,免回表
SELECT id, name FROM user WHERE name = 'tom';

-- 要 age,但 age 不在该索引里 → 必须回表
SELECT id, name, age FROM user WHERE name = 'tom';

-- 建联合索引 (name, age),让常用查询被覆盖
ALTER TABLE user ADD INDEX idx_name_age (name, age);
-- 此时下面这条又变成覆盖索引,免回表
SELECT id, name, age FROM user WHERE name = 'tom';
```

判断方法：`EXPLAIN` 的 **Extra** 列出现 **`Using index`** 即表示用了覆盖索引（注意区别于 `Using where`）。这也是"别动不动 `SELECT *`"的重要原因——`SELECT *` 几乎一定要回表。

## 七、联合索引与最左前缀原则

联合索引 `(a, b, c)` 是按 **a 优先，a 相同再按 b，b 相同再按 c** 的顺序排好的一棵 B+ 树。能不能用上索引，遵循**最左前缀原则**：查询条件必须从最左列开始、且连续，才能用上对应前缀。

```text
联合索引 (a, b, c) 的排序: 先看 a,再看 b,再看 c
   (1,1,1) (1,1,2) (1,2,1) (2,1,1) ...
     └─ a 全局有序;b 只在 a 固定时有序;c 只在 a,b 都固定时有序
```

| 查询条件 | 能用到索引的部分 | 说明 |
|---|---|---|
| `WHERE a=1` | a | 命中最左列 |
| `WHERE a=1 AND b=2` | a, b | 连续最左前缀 |
| `WHERE a=1 AND b=2 AND c=3` | a, b, c | 全命中 |
| `WHERE b=2`（无 a） | 无 | 断了最左列，用不上 |
| `WHERE a=1 AND c=3`（跳过 b） | 只 a | b 断了，c 用不上（c 只在 b 固定时才有序） |
| `WHERE a=1 AND b>5 AND c=3` | a, b（c 失效） | **范围列后面的列失效**，见下 |

**范围列之后失效**：一旦某列用了范围查询（`>`、`<`、`BETWEEN`、`LIKE 'x%'`），它**后面的列就无法再用索引排序定位**。因为范围匹配了一段区间后，区间内对于后续列是无序的。

```sql
-- 索引 (a,b,c)
-- b 用了范围 → c 在索引里用不上(只能 a,b 走索引,c 退化为过滤)
SELECT * FROM t WHERE a=1 AND b>5 AND c=3;
```

实践：**把等值（=）查询的列放在联合索引左边，范围查询的列放右边**；区分度高、最常用的列尽量靠左。

## 八、索引下推（ICP，5.6+）

**索引下推（Index Condition Pushdown）** 是 MySQL 5.6 引入的优化：把本来要"回表后在 Server 层才能过滤"的条件，**下推到存储引擎的索引层先过滤**，减少回表次数。

```sql
-- 联合索引 (name, age)
SELECT * FROM user WHERE name LIKE '张%' AND age = 20;
```

```text
无 ICP(旧):
   索引层按 name LIKE '张%' 拿到一批主键 → 全部回表取整行 → Server 层再判 age=20
   ▲ 即使 age 明明在索引里,也先回表,大量无效回表

有 ICP(5.6+):
   索引层按 name LIKE '张%' 缩到候选,顺手用索引里的 age 先判 age=20
   → 只把 (name 匹配 且 age=20) 的行回表
   ▲ age 这个条件被「下推」到索引层,回表次数大幅减少
```

判断：`EXPLAIN` 的 **Extra** 出现 **`Using index condition`** 表示用上了索引下推。注意它和覆盖索引（`Using index`）不同——ICP 仍然要回表，只是回得更少。

## 九、索引失效的常见场景

下面这些写法会让本该走的索引用不上（多数会退化成全表扫描或全索引扫描）：

```sql
-- 1) 在索引列上做函数/运算 → 索引列被"包裹",无法用有序性定位
SELECT * FROM t WHERE YEAR(create_time) = 2024;   -- 失效
SELECT * FROM t WHERE create_time >= '2024-01-01'
                  AND create_time <  '2025-01-01'; -- 改写成范围,可用索引
SELECT * FROM t WHERE id + 1 = 10;                 -- 失效;应写 id = 9

-- 2) 隐式类型转换 → 等价于在列上套了转换函数
--    phone 是 varchar,却用数字比 → 触发 CAST,索引失效
SELECT * FROM t WHERE phone = 13800000000;         -- 失效;应写 phone = '13800000000'

-- 3) 前导 % 模糊匹配 → 无法利用前缀有序
SELECT * FROM t WHERE name LIKE '%tom';            -- 失效
SELECT * FROM t WHERE name LIKE 'tom%';            -- 可用(最左前缀)

-- 4) 最左前缀断裂(见第七节) → 跳过最左列/中间列
SELECT * FROM t WHERE b = 2;                        -- 索引(a,b,c)用不上

-- 5) OR 连接的条件,只要有一侧的列没有索引 → 整体可能走全表扫描
SELECT * FROM t WHERE a = 1 OR no_idx_col = 2;     -- no_idx_col 无索引 → 易全表

-- 6) 负向条件: != / <> / NOT IN / NOT LIKE 等
--    选择性差时优化器倾向全表扫描(视数据分布与版本,由优化器估算决定)
SELECT * FROM t WHERE a != 1;
```

说明：是否"失效"很多时候由**优化器基于成本估算**决定（如即便能用索引，但要扫的行占比很大，优化器会判断全表扫描更划算而主动放弃索引）。`!=`、`NOT IN`、负向条件属于"视情况"，并非绝对失效——以 `EXPLAIN` 实测为准。

## 十、为什么推荐自增主键

InnoDB 是按主键有序组织的 B+ 树（聚簇索引），主键值决定了行在叶子层的**物理插入位置**。因此主键怎么取，直接影响写入性能。

**自增主键（推荐）**：新行的主键总是比已有的大，插入只会落在 B+ 树**最右侧的叶子页**——相当于**顺序追加**，写满一页再开新页，磁盘上接近顺序写。

```text
自增主键: 1,2,3,4,5,...  插入永远在最右页末尾追加
   [..|3|4|5] → 满 → 申请新页 [6|7|8]   ← 顺序、紧凑、几乎无页分裂
```

**随机主键（如 UUID / 无序字符串，不推荐）**：新主键可能落在 B+ 树中间任意已满的页里。为了腾出位置，InnoDB 要做**页分裂**——把一个满页拆成两页、搬移一半数据，由此带来三个代价：

```text
随机主键: 要插的 key=4 落在已满的页 [3|5|7] 中间
   [3|5|7] 已满 → 插 4 → 页分裂 → [3|4] 和 [5|7]   ← 搬数据 + 多一页
```

- **页分裂**：满页插入要拆页、搬移数据，CPU 与 IO 开销大。
- **随机 IO**：插入点散布在各处，磁盘读写从顺序变随机，吞吐下降。
- **页碎片**：分裂后页填充率下降（很多页只半满），空间利用率低、缓存命中率也变差。

```text
对比小结:
   自增主键  → 顺序追加 → 几乎无页分裂、顺序 IO、页填充紧凑
   随机主键  → 中间插入 → 频繁页分裂、随机 IO、页碎片多
```

因此实务上**优先用 `BIGINT AUTO_INCREMENT` 自增主键**；确需全局唯一/分布式 ID 时，也倾向选**趋势递增**的方案（如雪花算法 Snowflake），尽量保持插入有序，规避页分裂与随机 IO。

## 十一、EXPLAIN 实战

`EXPLAIN SELECT ...` 是分析索引是否生效的核心工具，重点看几列：

```sql
EXPLAIN SELECT id, name FROM user WHERE name = 'tom';
```

**`type`（访问类型，性能从好到差）**：

```text
system > const > eq_ref > ref > range > index > ALL
  ▲最好                                            ▲最差(全表扫描)
```

| type | 含义 |
|---|---|
| `const` / `system` | 主键 / 唯一索引等值查，最多一行（system 是 const 的特例） |
| `eq_ref` | 连接时对每个外层行，用主键/唯一索引精确匹配一行 |
| `ref` | 普通（非唯一）索引等值匹配，可能多行 |
| `range` | 索引范围扫描（`>`、`BETWEEN`、`IN` 等） |
| `index` | 全**索引**扫描（扫整棵索引树，比 ALL 略好，常见于覆盖索引扫描） |
| `ALL` | 全**表**扫描，通常意味着没用上索引，需重点优化 |

**其它关键列**：

- **`key`**：实际使用的索引名（为 `NULL` 表示没走索引）。`possible_keys` 是候选，`key` 才是真正用的。
- **`rows`**：优化器估算要扫描的行数，越小越好。
- **`Extra`**：附加信息，常见取值：

```text
Using index        → 覆盖索引,免回表 (好)
Using where        → 在 Server 层用 WHERE 过滤(可能伴随回表)
Using index condition → 用上了索引下推 ICP(第八节)
Using filesort     → 无法用索引完成排序,需额外排序(ORDER BY 没走索引,应优化)
Using temporary    → 用了临时表(常见于 GROUP BY/去重,开销大,应优化)
```

排查口诀：先看 `type` 有没有到 `ALL`、`key` 是不是 `NULL`，再看 `Extra` 有没有出现 `Using filesort` / `Using temporary` 这类需要优化的信号。

## 一句话总结

> InnoDB 用 **B+ 树**做索引：它**矮胖**（非叶子只存键、扇出大、节点≈16KB 页，三四层撑千万行）、**叶子存数据且双向链表相连**（等值、范围、排序都友好），把磁盘 IO 压到最少。InnoDB 是**索引组织表**——**聚簇索引**叶子存整行、**二级索引**叶子只存主键，于是用二级索引查非索引列要**回表**；让查询所需列都落在索引里就构成**覆盖索引**免回表。联合索引遵守**最左前缀**且**范围列之后失效**；**索引下推（5.6+）**把可过滤条件下推到索引层减少回表。函数/运算包裹列、隐式类型转换、前导 `%`、最左前缀断裂等会导致**索引失效**。一切以 **`EXPLAIN`**（看 `type`/`key`/`rows`/`Extra`）实测为准。建表优先用**自增主键**——顺序追加、避免随机主键带来的**页分裂、随机 IO、页碎片**（第十节）。
