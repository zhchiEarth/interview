# Channel 底层实现与安全关闭

> Channel 是 Go 并发的语言级原语。从演化视角看：每出现一个需求，hchan 就长出一个机制。
> 这一篇包含**底层结构**（hchan / 无缓冲 / 有缓冲 / select）+ **安全关闭模式**（close 语义 + 三种生产-消费场景的正确写法）。

## 为什么 Go 有 channel — CSP 模型

Go 选了一条不同于"共享内存 + mutex"的路——**CSP（Communicating Sequential Processes）模型**：

> Don't communicate by sharing memory; share memory by communicating.

把数据"所有权"通过 channel 传递出去，每个时刻只有一个 goroutine 持有它。Channel 是 Go 实现 CSP 的载体。

---

## hchan 长这样

`runtime/chan.go` 里的核心结构：

```text
┌─────────────────────────────────────────────────┐
│  hchan  (一把锁保护下面所有字段)                  │
├─────────────────────────────────────────────────┤
│                                                 │
│   buf [ slot0 | slot1 | slot2 | ... ]   ← 环形  │
│           ↑recvx        ↑sendx                  │
│   qcount / dataqsiz                             │
│                                                 │
│   recvq  → G → G → G   (等接收的 goroutine)      │
│   sendq  → G → G       (等发送的 goroutine)      │
│                                                 │
│   closed   uint32                               │
│   lock     mutex                                │
└─────────────────────────────────────────────────┘
```

记住三件套：**一把锁 + 一个环形缓冲 + 两条等待队列**。

---

## 第 1 版：无缓冲 channel — 必须双方碰头

语义：`ch <- x` 和 `<-ch` 必须**同时就绪**，否则先到的一方挂起等候。

> 📌 **下面图里的 G1、G2 共享同一个 channel**——也就是同一个堆上的 hchan。channel 变量本质是一个 `*hchan` 指针，谁持有 ch 谁就能操作那个 hchan，靠 hchan 内的 `lock` 串行化访问。

### 场景 A：接收方先到

```text
G2 已挂在 recvq:
    recvq: [ G2 ]   sendq: [ ]

G1 来发送：
    G1: ch <- x
        │
        ① 拿 lock
        ② 看 recvq 有 G2
        │
        ╔═════════════════════════════════════╗
        ║  ③ 数据从 G1 栈 ──直接拷贝──→ G2 栈 ║   ← 绕过 buf
        ╚═════════════════════════════════════╝
        │
        ④ 唤醒 G2；G1 继续跑

结果:
    recvq: [ ]      sendq: [ ]   (清空)
```

> 这个"栈到栈直拷"是无缓冲 channel 的关键优化——比经过 buf 中转少一次拷贝。

### 场景 B：发送方先到

```text
G1: ch <- x
    │
    ① 拿 lock
    ② recvq 空 → 没人接
    ③ 把 G1 包成 sudog 进 sendq，gopark 挂起

    recvq: [ ]      sendq: [ G1(挂起,带着 x) ]

       ⋯ 等接收方 ⋯

G2: <- ch
    │
    ① 拿 lock
    ② 看 sendq 有 G1
    ③ 把 G1 携带的 x 直接拷给 G2，唤醒 G1

    recvq: [ ]      sendq: [ ]
```

> 上面"把 G 包成 sudog 进 sendq/recvq"——sudog 是 G 在等待队列上的代表节点，channel/select/Mutex 的阻塞机制都靠它。详见 [sudog：阻塞/唤醒的通用节点](../golang/03-expert/sudog.html)。

## 第 2 版：有缓冲 channel — 环形队列解耦

`make(chan int, 4)` 给 buf 分配 4 个 slot 的固定数组（不会扩容！）。怎么把"先进先出 + 不挪数据"做出来？答案就是**环形队列**：用两个下标在固定数组上转圈。

### 三个关键字段

| 字段 | 作用 | 类比 |
|---|---|---|
| `sendx` | 下一次写入要放到哪个 slot | 写指针：发送方在哪儿"下笔" |
| `recvx` | 下一次读取要从哪个 slot 拿 | 读指针：接收方该读哪一格 |
| `qcount` | 当前 buf 里实际有几个元素 | 现在队列里多少东西（决定是否满 / 空） |

> **为什么不挪数据？** 写入只动 `sendx++`，读取只动 `recvx++`。slot 里的内容**原地不动**，从不搬家——这就是 O(1) 入队 O(1) 出队的关键。

### "越界回 0" 怎么算

数组只有 4 个 slot，但发送会一直进行——下标走到 4 时怎么办？

```text
sendx = (sendx + 1) % dataqsiz    // dataqsiz = 4
```

也就是说 `sendx` 在 0→1→2→3→0→1→... 永远在 [0, 4) 之间循环。`recvx` 同理。两个指针就这样在固定数组上**转圈追逐**，这就是"环形"。

### 怎么判断满 / 空

光看 sendx 和 recvx **分不清满和空**——它俩重合时可能 qcount=0（空）也可能 qcount=4（满）。所以多了一个 `qcount` 字段直接计数：
- `qcount == 0` → 空（接收方要挂起）
- `qcount == dataqsiz` → 满（发送方要挂起）

### 写入演示（4 步动画）

#### 第 0 步：刚 make 出来

```text
make(chan int, 4)
─────────────────────────────────────────
        slot0  slot1  slot2  slot3
buf:    │     │     │     │     │
        └─────┴─────┴─────┴─────┘
        ↑sendx
        ↑recvx           qcount=0   (空)
```

> 两个指针都指 slot0，qcount=0，没东西可读。

#### 第 1 步：连发三个

```text
ch <- a;  ch <- b;  ch <- c
─────────────────────────────────────────
        slot0  slot1  slot2  slot3
buf:    │  a  │  b  │  c  │     │
        └─────┴─────┴─────┴─────┘
        ↑recvx              ↑sendx
                           qcount=3
```

> 每次 send：把值写到 `buf[sendx]`，然后 `sendx++` 和 `qcount++`。
> a 进了 slot0、b 进 slot1、c 进 slot2。**recvx 没动**——还没人读。
> 现在 sendx 指向 slot3（下次写这里），recvx 指向 slot0（下次读这里）。

#### 第 2 步：取一个

```text
x := <-ch     // 取走 a，recvx 前进
─────────────────────────────────────────
        slot0  slot1  slot2  slot3
buf:    │  ·  │  b  │  c  │     │
        └─────┴─────┴─────┴─────┘
              ↑recvx       ↑sendx
                          qcount=2
```

> 接收方读 `buf[recvx]`（=a），然后 `recvx++` 和 `qcount--`。
> slot0 那个 `·` 表示"逻辑上已无效"——但**真实内存没擦**，下次写到 slot0 时直接覆盖。
> 这就是为什么我们说"FIFO"：先进的 a 先被读走。

#### 第 3 步：再发两个，sendx 绕回去

```text
ch <- d; ch <- e  // sendx 越界回 0
─────────────────────────────────────────
        slot0  slot1  slot2  slot3
buf:    │  e  │  b  │  c  │  d  │
        └─────┴─────┴─────┴─────┘
        ↑sendx ↑recvx
                          qcount=4   (满)
```

> ch <- d：sendx=3，把 d 写到 slot3，然后 `sendx = (3+1) % 4 = 0`。指针绕回了。
> ch <- e：sendx=0，把 e 写到 slot0（**直接覆盖那个 a 留下的"垃圾"**），然后 `sendx = 1`。
> qcount=4，buf 满。**此时再来一个 send 就会进 sendq 挂起。**

> **关键直觉**：sendx 永远指向"下一个要写的位置"（即使 buf 满，它也指着那个被读出去后空出来的格子）。recvx 永远指向"下一个要读的位置"。两个指针追逐前进，谁也不会越过谁——`qcount` 来卡这个边界。

### 写入的三条优先级

```text
chansend(ch, x):
  ① recvq 非空？─→ 直接拷给队首接收者，绕过 buf
       │ 否
  ② buf 未满？  ─→ 写到 buf[sendx], sendx++, qcount++
       │ 否
  ③ buf 满     ─→ 入 sendq, gopark 挂起
```

### buf 满时入队

```text
buf:  [ a │ b │ c │ d ]   ← 满
sendq: [ G_send1 → G_send2 ]   ← 挂着等

接收方 G_R 来了：
  ① 从 buf[recvx] 取走 a
  ② 让 sendq 头 G_send1 把它的值写到这个刚腾出的 slot
     （保持 FIFO 顺序）
  ③ 唤醒 G_send1
```

读取过程对称。

## 第 3 版：close — 一次广播两边

```text
                close(ch)
                    │
              closed = 1
                    │
        ┌───────────┴───────────┐
        ↓                       ↓
   recvq 全员唤醒          sendq 全员唤醒
   (每个收到 零值, ok=false)    (每个直接 panic!)
```

### 后续操作的行为

| 操作 | 已关闭 channel 的行为 |
|---|---|
| `<-ch`（buf 有数据） | 正常取出（缓冲数据保留） |
| `<-ch`（buf 空） | 立刻返回零值 + ok=false |
| `ch <- x` | **panic** |
| `close(ch)` | **panic（重复关闭）** |
| `for x := range ch` | buf 取完后**自动退出循环** |

### 怎么检测 channel 已关闭

```go
v, ok := <-ch    // ok == false 表示已关闭且 buf 已空
```

注意：**没有 IsClosed() API**。这是有意为之——能"检测"就一定有 race（你检查时是开的，下一行就关了）。Go 的设计是让你**通过 receive 来观察 close 状态**。

---

### 安全关闭的三条铁律

考点：**panic 防御 + 多生产者协作的设计能力**。

1. **谁发送，谁关闭**——接收方关 channel 是反模式
2. **不要重复关闭**——重复 close 直接 panic
3. **关闭后不要再发送**——同样 panic

> `recover` 能兜住 panic，但**用 recover 替代正确设计**是糟糕的工程实践——锁/close 这种结构性原语，应该靠协作设计而不是异常捕获。

---

### 场景 1：单生产者单消费者

最简单。生产者完成时 close 即可，消费者 `for range` 自动收尾。

```go
ch := make(chan Task, 10)
go func() {
    defer close(ch)
    for _, t := range tasks {
        ch <- t
    }
}()
for t := range ch {
    process(t)
}
```

**为什么干净**：close 只发生一次（defer 保证），且发送停了之后才 close（顺序明确）。

---

### 场景 2：多生产者单消费者

不能让任何一个生产者直接 close（会重复 close panic）。

**方法 A：`sync.Once`（简单粗暴）**

```go
var once sync.Once
closeCh := func() { once.Do(func() { close(ch) }) }

for _, p := range producers {
    go func(p Producer) {
        for _, t := range p.Tasks {
            ch <- t
        }
        closeCh()    // 每个生产者结束时都尝试关, once 保证只关一次
    }(p)
}
```

⚠️ 缺点：第一个完成的生产者就关 channel，**其它生产者的后续 send 会 panic**。所以 once 模式只适用于"生产者要么全都完成、要么全都退出"的场景。

**方法 B：`WaitGroup` 协调（更推荐）**

```go
var wg sync.WaitGroup
for _, p := range producers {
    wg.Add(1)
    go func(p Producer) {
        defer wg.Done()
        for _, t := range p.Tasks {
            ch <- t
        }
    }(p)
}

// 协调者 goroutine: 等所有生产者结束后关 channel
go func() {
    wg.Wait()
    close(ch)
}()
```

**为什么更好**：close 一定发生在所有生产者完成**之后**，不会再有 send → 不会 panic。**职责清晰**：生产者负责生产，协调者负责关闭。

---

### 场景 3：多生产者 + 提前终止（最复杂）

消费者中途发现错误，要让所有生产者立即停下。需要一个**反向 done channel**：

```go
done := make(chan struct{})
ch   := make(chan Task, 10)

// 生产者
for _, p := range producers {
    go func(p Producer) {
        for _, t := range p.Tasks {
            select {
            case ch <- t:
                // 正常发送
            case <-done:
                return    // 收到停止信号,立即退出
            }
        }
    }(p)
}

// 消费者发现错误时:
close(done)   // 通知所有生产者退出
```

**关键点**：

- `ch` **本身不需要 close**——生产者退出后没人再发，消费者不会再收，channel 被 GC 自然回收
- `done` 是个"广播信号"——关闭一个 channel 会让**所有**正在等待它的 goroutine 收到信号
- 这是 **"广播信号"** 这个语义最经典的用法

为什么用 `close(done)` 而不是 `done <- struct{}{}`？

```
done <- struct{}{}  → 只通知一个 G (channel 是一对一传递)
close(done)         → 同时通知所有等待 done 的 G (广播)
```

---

### close 的本质：是广播，不是"关资源"

很多人把 `close(ch)` 当成"关掉资源"（像 `file.Close()` 那样）——这是误解。

**`close(ch)` 是一个广播指令**：

```
close(ch) 做的两件事:
  1. 把 hchan.closed 置 1
  2. 唤醒所有挂在 recvq 上的 G (每个 G 都收到零值 + ok=false)
```

理解为"广播"而不是"清理"，所有 close 用法就都自洽了：

| 用法 | "广播"视角解读 |
|---|---|
| 生产者关 ch | 广播"我没数据了" |
| close(done) 通知退出 | 广播"该停了" |
| 关 channel 当一次性事件 | 广播"事件已发生" |
| 接收方关 channel | ❌ 接收方不该广播"我不收了"——这语义错了 |

→ **谁发送，谁关闭**这条铁律本质上是：**只有信号的源头才该广播信号**。

## 第 4 版：select — 多路监听

```go
select {
case x := <-chA: ...
case chB <- v:   ...
case <-time.After(1 * time.Second): ...
default: ...
}
```

### 多路挂起示意

```text
   当前 G
     │
     │  分别挂上每个 channel 的等待队列
     ├──→ chA.recvq:  [ ... → G ]
     ├──→ chB.sendq:  [ ... → G ]
     └──→ tmrCh.recvq:[ ... → G ]

任一 channel 就绪：
  唤醒 G → 从其他几个的队列上摘下来 → 走对应 case
```

### 核心流程（runtime.selectgo）

```text
1. 把所有 case 顺序打乱（避免某个 case 饿死别人）
2. 第一轮：对每个 case 尝试非阻塞操作
     成功 → 走它的分支
3. 都不行 + 没 default
     → 把当前 G 挂到所有相关队列上 (gopark)
4. 任一 channel 就绪
     → 唤醒 G，从其它队列摘下，走对应分支
5. 都不行 + 有 default
     → 立刻走 default（等于 select 完全非阻塞）
```

`time.After(1s)` 不是魔法，就是一个 1 秒后会被写入的 channel。

## 第 5 版：常见陷阱（背下来）

### nil channel 的特殊行为

```go
var ch chan int  // nil
<-ch             // 永远阻塞
ch <- 1          // 永远阻塞
close(ch)        // panic
```

**实战用法**：在 select 里把某个 case 的 channel 置 nil，**临时禁用这个分支**——常用于"消费完一个数据源后不再监听它"。

```text
select {                 select {
case <-chA: ...          case <-chA: ...    ← chA 还能用
case <-chB: ...    →     case <-nil: ...    ← chB 永久禁用本轮
}                        }
```

### 多生产者关闭难题

```go
// ❌ 多个 producer 各自 close
go func() { ...; close(ch) }()
go func() { ...; close(ch) }()  // 第二个 close 直接 panic
```

解法：
- `sync.Once` 包 close
- 反向 done channel：协调者通知所有 producer 退出 → 等它们都退 → 协调者关 ch

### range 自动收尾

```go
for x := range ch {
    // close 后 buf 取完会自动退出，不用手动判 ok
}
```

### len/cap 是瞬时值

`len(ch)` / `cap(ch)` 是某一刻的快照；**多 goroutine 下不能用来判断"还有空间吗"**——读完那一行到下一行之间可能已被填满。

## 全貌一张表

| 场景 | 路径 |
|---|---|
| send + recvq 非空 | 直接交付给队首接收者（绕过 buf） |
| send + buf 未满 | 入 buf，不阻塞 |
| send + buf 满 | 入 sendq，挂起 |
| recv + sendq 非空（无缓冲） | 直接从发送者栈拿 |
| recv + buf 非空 | 从 buf 取（满时同时让 sendq 头补位） |
| recv + buf 空 + sendq 空 | 入 recvq，挂起 |
| close | 唤醒所有 recvq（零值），唤醒所有 sendq（panic） |

---

## 实战选型：无缓冲 vs 有缓冲

理解了内部机制后，回到应用视角——**无缓冲 = 握手，有缓冲 = 队列**。

### 语义对比

| 维度 | 无缓冲 | 有缓冲 (cap N) |
|---|---|---|
| 创建 | `make(chan T)` 或 `make(chan T, 0)` | `make(chan T, N)` |
| 发送语义 | 必须等接收方就绪 | 缓冲未满即可发送 |
| 接收语义 | 必须等发送方就绪 | 缓冲非空即可接收 |
| 触发 goroutine 切换 | 几乎一定 | 缓冲未满 / 未空时不切换 |
| 典型用途 | 同步信号、握手交付 | 解耦生产 / 消费速度差 |

### 选哪种

| 场景 | 选择 | 原因 |
|---|---|---|
| 启动信号 / 完成通知 | 无缓冲 | 必须确保对方收到了 |
| 任务队列 / pipeline | 有缓冲 | 生产消费速度未必匹配，缓冲提升吞吐 |
| 限流 / 信号量 | 有缓冲（cap = 并发数） | `ch <- struct{}{}` 占位，满了自然阻塞 |
| 错误传递（多 goroutine） | 有缓冲（cap ≥ goroutine 数） | 防止报错的 goroutine 因没人收而泄漏 |

### 一个常被忽略的陷阱

**无缓冲 channel 只能保证"对方进入了 channel 操作"，不保证"对方处理完了"。**

```go
done := make(chan struct{})
go func() {
    doWork()
    <-done       // ❌ 用 receive 当退出信号
}()
done <- struct{}{}  // 发送方只知道对方收到了信号，不知道 doWork 是否完成
```

要等"做完"，让 worker 在 `doWork` 之后再 send，或直接用 `sync.WaitGroup`。

---

## 一句话终极总结

> **Channel = 一把锁 + 一个环形缓冲 + 两条等待队列**。hchan 用这三样东西，把"goroutine 间通信"做成了语言级一等公民。
>
> 应用层：**无缓冲 = 握手保证同步，有缓冲 = 队列吸收速度差**。
>
> **close = 广播信号，不是关资源**——谁发送谁关闭、不重复关、关后不再发；多生产者用 WaitGroup 协调关闭；提前终止用反向 done channel 广播。
