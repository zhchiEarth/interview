# MySQL 锁机制

> 一句话：锁按**粒度**分为**全局锁（FTWRL）/ 表级锁（表锁、MDL、意向锁）/ 行级锁**；InnoDB 行锁分**记录锁 / 间隙锁 / 临键锁（RR 默认、防幻读）**，且**全部加在索引上**——不走索引就退化成近似锁表；并发控制还有**乐观锁 vs 悲观锁**，交叉加锁会**死锁**，靠 wait-for graph 检测 + 超时兜底。

> 本文默认讨论 **MySQL InnoDB 存储引擎**，隔离级别默认 **RR（可重复读）**。行锁、间隙锁、幻读与 MVCC 的关系见 [事务与隔离级别](transaction.html)；"行锁基于索引"的前提是索引知识，见 [MySQL 索引原理](index.html)。

## 一、按粒度看：全局锁 / 表级锁 / 行级锁

```text
   粒度从大到小            谁加              典型场景
   ┌─ 全局锁 ───────┐    FTWRL            全库逻辑备份(整库只读)
   │  表级锁 ────────┤    表锁/MDL/意向锁  DDL、防改表时结构变更
   └─ 行级锁(InnoDB)─┘    记录/间隙/临键锁  普通并发增删改查
   粒度越大 → 冲突越多、并发越低；粒度越小 → 并发越高、开销与死锁概率上升
```

## 二、全局锁：FTWRL

```sql
FLUSH TABLES WITH READ LOCK;   -- 简称 FTWRL，整个库进入只读
-- ... 做全量逻辑备份 ...
UNLOCK TABLES;                 -- 释放
```

加上后**整库只读**：所有库所有表的 `INSERT/UPDATE/DELETE`、以及改表结构、改事务提交语句都被阻塞。**典型用途是做全库逻辑备份**，保证备份期间数据视图一致。

> 缺点很明显：主库上锁则业务停摆，从库上锁则复制延迟。所以 `mysqldump` 对支持事务的引擎更推荐用 **`--single-transaction`**——它靠一个可重复读事务 + MVCC 拿到一致性快照，**不必加全局锁**。FTWRL 主要留给不支持事务的引擎（如 MyISAM）。

## 三、表级锁：表锁 / 元数据锁 MDL / 意向锁

### 3.1 表锁（lock tables）

```sql
LOCK TABLES t READ;    -- 给 t 加表级读锁(别人只能读)
LOCK TABLES t WRITE;   -- 给 t 加表级写锁(别人读写都不行)
UNLOCK TABLES;
```

显式表锁。InnoDB 支持更细的行锁，因此**一般不主动用表锁**，它更多出现在 MyISAM 时代。

### 3.2 元数据锁 MDL（Metadata Lock）

MDL **不需要显式声明，访问表时自动加**，用来保证"读写数据时表结构不被改"：

```text
   DML (增删改查) → 自动加 MDL 读锁  ← 读锁之间不互斥(多事务可同时读写数据)
   DDL (改表结构) → 自动加 MDL 写锁  ← 写锁与任何 MDL 锁互斥
```

读锁之间兼容，**读写锁、写写锁互斥**——即"有人在读写表数据时，不允许另一个连接改它的结构"，反之亦然。

> 经典坑：**一个长事务（持有 MDL 读锁不放）会把后面的 DDL（要 MDL 写锁）卡住，而排在 DDL 后面的所有新查询又要 MDL 读锁、被 DDL 一起堵死 → 整张表瞬间不可访问。** 所以线上做 DDL 前要先确认没有长事务（查 `information_schema.innodb_trx`），或用带超时的在线 DDL 工具。MDL 在事务**提交时才释放**，不是语句结束就放。

### 3.3 意向锁（Intention Lock，IS / IX）

意向锁是**表级**的"标记锁"，表示"这张表里**有行**将被加 S / X 锁"，由 InnoDB 在加行锁时**自动加在表上**：

```text
   要给某行加 S 锁(共享) → 先自动给表加 IS(意向共享)
   要给某行加 X 锁(排他) → 先自动给表加 IX(意向排他)
```

**作用**：当有人要加**表级**锁时，只需看表上有没有 IX/IS，就能 **O(1) 判断"表里是否已有行锁"**，而不必逐行扫描所有行锁。兼容性如下（行锁层面 IS/IX 互不冲突，只在和表级 S/X 比较时起作用）：

```text
           已持有
   申请     IS    IX    S(表)  X(表)
   IS        ✔     ✔      ✔      ✘
   IX        ✔     ✔      ✘      ✘
   S(表)     ✔     ✘      ✔      ✘
   X(表)     ✘     ✘      ✘      ✘
   (✔=兼容可同时持有, ✘=冲突需等待)
```

## 四、InnoDB 行级锁

### 4.1 共享锁 S / 排他锁 X

| 锁 | 加锁语句 | 含义 | 兼容性 |
|---|---|---|---|
| **共享锁 S**（读锁） | `SELECT ... LOCK IN SHARE MODE`（8.0：`FOR SHARE`） | 允许别人也读(加 S)，但不许改 | S 与 S 兼容 |
| **排他锁 X**（写锁） | `SELECT ... FOR UPDATE`、`UPDATE`、`DELETE` | 独占，别人既不能加 S 也不能加 X | X 与任何锁互斥 |

`INSERT/UPDATE/DELETE` 会自动给涉及行加 X 锁。

### 4.2 行锁的三种形态：记录锁 / 间隙锁 / 临键锁

| 锁 | 锁的范围 | 作用 |
|---|---|---|
| **记录锁** Record Lock | 索引上的**某一条记录** | 防该行被并发改 |
| **间隙锁** Gap Lock | 索引记录之间的**开区间(间隙)**，不含记录本身 | 防往间隙里 INSERT → 防幻读 |
| **临键锁** Next-Key Lock | **记录锁 + 间隙锁**，**左开右闭** `(a, b]` | **RR 下默认行锁**，既锁记录又锁间隙 |
| **插入意向锁** Insert Intention | 一种特殊的间隙锁，INSERT 前在目标间隙申请 | 标记"我要往这插入"，多个不同位置的插入意向锁互相兼容、提高插入并发；但被已有间隙锁阻塞 |

```text
   索引:  ... 10 ────── 20 ────── 30 ...
              │   间隙   │  间隙   │
   记录锁:    ●(只锁 20 这条记录)
   间隙锁:         ◇◇◇◇(锁 (10,20) 这段间隙，不让插入，但 10/20 本身可改)
   临键锁:    ◇◇◇◇●(锁 (10,20] 左开右闭，记录+间隙一起锁)
```

> **间隙锁特性**：间隙锁之间**互相兼容**（两个事务可以锁住同一个间隙），它只和"往这个间隙里插入"冲突。这点反直觉，但正是它能"防幻读"又不至于完全串行化的原因——也因此两个事务各自持有间隙锁、又都想往里插入时，会**互相等待形成死锁**（见第七节）。

### 4.3 间隙锁 / 临键锁只在 RR 出现

- **RR（默认）**：用**临键锁**，靠间隙锁防住当前读的幻读。
- **RC（读已提交）**：基本**只加记录锁、不加间隙锁**（除外键检查等少数场景），所以 RC 并发更好、但有幻读。

这也是 RC 与 RR 在锁层面的核心差别。

## 五、行锁基于索引（重要坑）

**InnoDB 的行锁都加在索引上**，而不是直接加在数据行上。后果是：

```text
   走索引命中     → 只锁命中的索引记录(及其间隙) → 行锁，精准
   没走索引       → 要全表扫描，扫到的每一行都加锁 → 近似"锁全表"！
```

```sql
-- 假设 name 上没有索引
UPDATE user SET age=20 WHERE name='tom';
-- 没有索引可用 → 全表扫描，扫描过程中给每一行都加 X 锁(临键锁)
-- → 实际把整张表锁住了，其他事务的写全被阻塞，并发雪崩
```

> 面试金句：**"行锁是加在索引上的，所以查询条件没命中索引时，行锁会退化成对所有扫描到的行加锁，效果接近锁表。"** 推论：① 加锁更新一定要走索引；② 即便没命中也会扫一遍全表加锁，提交/回滚后才释放。另外，**锁是加在索引上而非"行"上**，所以即使用不同索引访问同一行，也可能在不同索引上各自加锁。

## 六、加锁规则（RR 下，给直觉）

RR 下加锁的基本单位是 **next-key lock（左开右闭区间）**，再在两种特殊情况下"收缩"。下面按"等值 / 范围"给直觉（以唯一索引为例，普通索引/无索引会更复杂）：

```text
   基本单位:  next-key lock = (前一条, 命中条]  左开右闭

   ① 等值查询、命中存在的行(唯一索引)
        → next-key lock 退化为【记录锁】(只锁这一行，不锁间隙)
        例: WHERE id=10 且 10 存在 → 锁住 id=10 这条记录

   ② 等值查询、未命中(值不存在)
        → next-key lock 退化为【间隙锁】(只锁它所在的那个间隙，不锁记录)
        例: WHERE id=15 且 15 不存在(10、20 存在)→ 锁住 (10,20) 间隙
        → 防止别人插入 id=15 这样的"幻影行"

   ③ 范围查询
        → 一路锁到边界: 锁住扫描经过的每个 next-key 区间，直到第一个
          不满足条件的记录所在区间为止 ("点到为止"，多锁一格到边界)
        例: WHERE id>10 → 从 (10,20] 一直锁到结尾
```

> 直觉口诀：**"等值命中退化成记录锁、等值落空退化成间隙锁、范围查询锁到边界（多锁一格、点到为止）。"** 唯一索引等值命中后不会再向右扩间隙，普通索引可能还会锁到下一个区间。具体加锁范围对版本敏感（8.0 有优化），面试讲清"为什么这样锁（防幻读 / 防插入）"比背死区间更重要。

## 七、死锁

### 7.1 怎么产生：交叉加锁

两个事务**以相反顺序**请求对方已持有的锁，互相等待、谁也不让：

```text
   事务A                          事务B
   BEGIN;                         BEGIN;
   UPDATE acc SET..WHERE id=1;    -- A 锁住 id=1
                                  UPDATE acc SET..WHERE id=2;  -- B 锁住 id=2
   UPDATE acc SET..WHERE id=2;    -- A 等 B 释放 id=2  ┐
                                  UPDATE acc SET..WHERE id=1;  -- B 等 A 释放 id=1
                                                       └→ 互相等待 = 死锁
```

间隙锁也常制造死锁：两个事务都先持有同一间隙的间隙锁（间隙锁互相兼容），然后又都想往该间隙 INSERT（插入意向锁被对方间隙锁挡住）→ 互等死锁。

### 7.2 检测与处理

InnoDB 默认开启**主动死锁检测**：

```text
   wait-for graph (等待图):
       A ──等待──→ B
       ↑           │
       └───等待────┘   出现环 ⇒ 检测到死锁

   处理: 选一个【回滚代价最小】的事务作为牺牲者回滚(报 1213 Deadlock found)，
         让另一个继续执行。
```

- `innodb_deadlock_detect = ON`（默认）：每个被阻塞的事务都触发一次环检测。高并发热点行场景下，检测本身可能成为 CPU 瓶颈，可考虑关闭并依赖超时。
- `innodb_lock_wait_timeout`（默认 **50** 秒）：**兜底**机制——等锁超过该时间直接报错回滚（1205 Lock wait timeout），不依赖图检测。

### 7.3 怎么避免

```text
   ① 多行更新按【固定顺序】加锁(如都按主键升序) → 不会交叉成环
   ② 缩小事务范围、尽快提交，减少持锁时间
   ③ 更新/加锁一定【走索引】，避免退化成锁全表扩大冲突面
   ④ 一次锁定所需全部资源，避免"先拿一个再要另一个"
   ⑤ 必要时降低隔离级别(RR→RC)，去掉间隙锁、减少锁冲突
   ⑥ 给热点更新引入排队/重试(捕获 1213 后重试事务)
```

## 八、乐观锁 vs 悲观锁

这是一种**并发控制思想**，不完全等同于数据库锁：

| | 悲观锁 | 乐观锁 |
|---|---|---|
| 假设 | **冲突很常见**，先锁再操作 | **冲突很少**，不锁，提交时才校验 |
| 实现 | DB 行锁，如 `SELECT ... FOR UPDATE` | **应用层**：version 字段 / CAS，靠 `UPDATE ... WHERE version=?` |
| 开销 | 持锁期间阻塞他人，吞吐低但安全 | 无锁、并发高；但冲突多时**重试**代价大 |
| 适用 | 写多、冲突频繁、临界资源 | 读多写少、冲突概率低 |

```sql
-- 悲观锁：先用 FOR UPDATE 锁住，再改，事务内独占
BEGIN;
SELECT stock FROM goods WHERE id=1 FOR UPDATE;   -- 加 X 锁，别人改不了
UPDATE goods SET stock=stock-1 WHERE id=1;
COMMIT;

-- 乐观锁：不加锁，靠 version 做 CAS，更新影响行数=0 说明被人改过 → 重试
-- 读: SELECT stock, version FROM goods WHERE id=1;   (假设 version=5)
UPDATE goods SET stock=stock-1, version=version+1
WHERE id=1 AND version=5;     -- 影响行数=1 成功; =0 表示已被改, 应用层重试
```

> 要点：**乐观锁是应用层逻辑（version/CAS），数据库本身并不存在"乐观锁"这种锁类型**；它适合冲突少的场景，冲突多时重试反而比悲观锁更差。悲观锁就是用真正的数据库行锁（`FOR UPDATE`）。

## 一句话总结

> 锁按粒度分三层：**全局锁 FTWRL**（全库只读、做全量备份，能用 `--single-transaction` 就别用它）；**表级锁**含表锁、**MDL**（DML 加读锁 / DDL 加写锁，防改表时结构变更，长事务会卡 DDL 进而堵全表）、**意向锁 IS/IX**（表级标记，O(1) 判断表里有无行锁）；**行级锁**含**记录锁 / 间隙锁 / 临键锁（RR 默认、防幻读）**，且**全部加在索引上——不走索引退化成近似锁表**。加锁规则记"等值命中退记录锁、落空退间隙锁、范围锁到边界"。死锁由交叉加锁产生，靠 **wait-for graph 检测**（回滚代价小者）+ `innodb_lock_wait_timeout` 兜底，避免靠**同序加锁 / 缩小事务 / 走索引**。并发控制还有**悲观锁（`FOR UPDATE`）vs 乐观锁（version/CAS，应用层）**。配套见 [事务与隔离级别](transaction.html) 与 [MySQL 索引原理](index.html)。
