# select 是怎么工作的？

> 前置阅读：[Channel 底层实现与安全关闭](internals.html)（select 操作的就是 hchan 的 sendq / recvq）

## 一、select 是干嘛的

`select` 解决一个具体问题：**同时等待多个 channel，谁先就绪走谁的分支**。

没有 select 的话，等 N 个 channel 你只能：

```go
// ❌ 串行等待 — 错过其它就绪的 channel
v1 := <-ch1   // 卡在这里
v2 := <-ch2   // 即使 ch2 早就绪也要等 ch1
```

或者起 N 个 goroutine 各自等一个 → 协调成本爆炸。

**select** 让 Go 在语言层面把"多 channel 等待"做成**原子操作**：

```go
select {
case v := <-ch1: ...
case v := <-ch2: ...
case ch3 <- x: ...
case <-time.After(time.Second): ...   // 超时
case <-ctx.Done(): ...                  // 取消
default: ...                            // 都没就绪走这
}
```

这就是 CSP 模型里 **"等多路通信"** 的语言级支持。

---

## 二、表面语法 + 行为规则

```go
select {
case x := <-ch1:                          // 读 case
case ch2 <- v:                            // 写 case
case <-time.After(1 * time.Second):       // 超时 case
default:                                  // 非阻塞分支
}
```

行为速查：

| 情况 | 行为 |
|---|---|
| **1 个 case 就绪** | 执行那个 case |
| **多个 case 同时就绪** | **随机选一个**（不是按代码顺序！） |
| **都没就绪 + 有 default** | 走 default（select 变非阻塞） |
| **都没就绪 + 无 default** | 阻塞挂起，直到任一 case 就绪 |
| **所有 case 的 channel 都是 nil + 无 default** | **永远阻塞**（实战用法见下） |

---

## 三、编译期：select 变成什么

编译器把每个 select **静态展开**成一个数组 + 调用 `runtime.selectgo`：

```go
// 你写的:
select {
case x := <-ch1: foo(x)
case ch2 <- v:   bar()
default:         baz()
}

// 编译器大致生成:
cases := [2]scase{
    {c: ch1, kind: caseRecv, elem: &x},
    {c: ch2, kind: caseSend, elem: &v},
}
chosen, recvOK := selectgo(&cases[0], &order[0], nselect)

switch chosen {
case 0: foo(x)
case 1: bar()
case -1: baz()    // -1 表示走 default
}
```

`selectgo` 是 runtime 里的核心函数（`runtime/select.go`），返回**选中哪个 case**，编译器再 jump 到对应分支。

---

## 四、selectgo 三阶段算法

selectgo 的伪代码：

```
fn selectgo(cases):
  ① 生成 polling order  (随机)
  ② 生成 lock order     (按 channel 地址排序)
  ③ 锁住所有涉及的 channel
  ④ 第一轮: 按 polling order 尝试非阻塞操作
       任一成功 → 解锁所有 channel, 返回那个 case
  ⑤ 如果有 default → 解锁, 返回 -1 (走 default)
  ⑥ 第二阶段: 把当前 G 包成 sudog, 挂到所有 channel 的等待队列
       解锁所有 channel
       gopark()  ← G 挂起
  ⑦ 被某个对端唤醒后:
       从其它 channel 的等待队列摘下自己
       返回唤醒它的那个 case
```

### 4.1 第一轮：非阻塞扫描（fast path）

```
                所有相关 channel 都被锁住
                       │
                       ▼
        按 pollOrder 顺序遍历每个 case:
                       │
                ┌──────┴──────┐
                ▼             ▼
            send case      recv case
            buf 未满?       buf 有数据?
            recvq 有人?     sendq 有人?
                │              │
                └──────┬───────┘
                       │
                  任一就绪 → 完成操作, 解锁返回 ✓
                       │
                  都没就绪 → 进第二阶段
```

**关键**：这阶段已经持有所有 channel 的锁，**check 和 commit 是原子的**——保证 select 自己看到一个就绪的 channel 时，能立刻拿到那个值，不会被别的 G 抢走。

### 4.2 default 短路（如果有 default）

第一轮都没成就绪、且**有 default** → 立刻解锁所有 channel，返回 -1 走 default。

→ 这就是为什么 `select { default: ... }` 是**完全非阻塞的**——它只走第一轮，不会挂起。

### 4.3 第二阶段：把 G 挂到所有 channel 上

如果没 default，要挂起当前 G。但 G 等的是**多个 channel** 中的**任意一个**——怎么实现？答案就是 sudog：给每个 case 造一个 sudog 分身去各自队列占位（这正是 sudog 解决的「一个 G ↔ 多个对象」多对多关系）。详见 [sudog：阻塞/唤醒的通用节点](../golang/03-expert/sudog.html)。

```
当前 G
   │
   │   为每个 case 包一个 sudog 节点 (sudog 是 G 在等待队列上的"代表")
   │
   ├──→ ch1.recvq:  [ G_other → sudog(G, case 0) ]
   ├──→ ch2.sendq:  [ ... → sudog(G, case 1) ]
   └──→ ch3.recvq:  [ ... → sudog(G, case 2) ]
                          ▲
                          │  这三个 sudog 互相链接,知道彼此是"兄弟"
                          │  (G.waiting 链表)

   解锁所有 channel
   gopark(G)  ← G 进入 _Gwaiting, M 解绑去跑别人
```

**G 同时挂在所有 channel 的等待队列上**——任一就绪都能唤醒它。

### 4.4 第三阶段：被唤醒后清理

```
某个对端来唤醒 G (比如 ch2 上有人 recv):
   │
   ├─ 把 ch2.sendq 上那个 sudog 的数据交付
   ├─ goready(G) → G 进入 _Grunnable
   │
   └─ G 醒来后:
        - 遍历自己 G.waiting 链表
        - 把其它 channel 等待队列上的兄弟 sudog 摘下来
          (否则 ch1/ch3 还以为我在等,以后误唤醒)
        - 返回那个唤醒它的 case 编号
```

**关键点**：唤醒后要**反向解链**——把自己从其它 N-1 个 channel 的队列上摘下，不然以后那些 channel 来事件时还会错误唤醒它。

---

## 五、几个关键设计

### 5.1 为什么要随机化 polling order

如果按代码顺序选，多个 case 同时就绪时永远走第一个：

```go
// 假设 ch1、ch2、ch3 永远都有数据
for {
    select {
    case <-ch1: ...    // 永远走这个
    case <-ch2: ...    // 永远饿死
    case <-ch3: ...    // 永远饿死
    }
}
```

随机化 polling order 保证**公平**——长期看每个 case 被选中的概率相等。

实现：在 selectgo 入口处用 `fastrandn(n)` 打乱 [0, n) 的顺序。

### 5.2 为什么要按地址排序加锁（lock order）

第二阶段要**同时锁住所有相关 channel** 才能挂 sudog。如果加锁顺序不固定，**会死锁**：

```
G_A: select { case <-ch1: case <-ch2: }   // 假设按代码顺序: 先锁 ch1 再锁 ch2
G_B: select { case <-ch2: case <-ch1: }   // 按代码顺序: 先锁 ch2 再锁 ch1

时间线:
  G_A: 锁 ch1 ✓
  G_B: 锁 ch2 ✓
  G_A: 等 ch2  ← 等 G_B 放
  G_B: 等 ch1  ← 等 G_A 放
  → 死锁! 💥
```

修法：**按 channel 在内存中的地址排序**，所有 G 都按同一全局顺序加锁：

```
全局顺序: 假设 &ch1 < &ch2 → 所有 G 都必须先锁 ch1 再锁 ch2

G_A: 锁 ch1 → 锁 ch2 ✓
G_B: 想锁 ch1 → 被 G_A 挡住, 等 (但 ch2 还没被它锁住)
G_A 完事释放 → G_B 拿到 ch1, 再拿 ch2 → 无死锁 ✓
```

### 5.3 两阶段的精妙：fast path / slow path

```
第一轮 (fast path): 已经锁住, 试一下能不能立刻搞定
   ↓ 大多数 case 走这里, 几百 ns 完事

第二阶段 (slow path): 真的没就绪, 挂起等
   ↓ 需要 sudog 分配 + gopark + 调度切换, 微秒级
```

**99% 的场景第一轮就搞定**——比如 `select { case <-ch: case <-timeout: }`，timeout 还远着，ch 就绪了就立刻走。

只有"所有 channel 都没就绪"的少数场景才走第二阶段。

---

## 六、nil channel 的妙用（实战技巧）

```go
var ch chan int  // nil channel
<-ch             // 永远阻塞
ch <- 1          // 永远阻塞
close(ch)        // panic
```

在 select 里把某个 case 的 channel **置为 nil**，等于**临时禁用这个分支**：

```
select {                 select {
case <-chA: ...          case <-chA: ...     ← chA 仍可用
case <-chB: ...    →     case <-nil: ...     ← 这个 case 永远不会被选
}                        }
```

为什么？因为 nil channel 永远不就绪——第一阶段对它的非阻塞 check 总返回"未就绪"，第二阶段挂在 nil channel 的等待队列也永远不会被唤醒。

### 经典场景：消费完一个数据源就关掉它

```go
for {
    select {
    case v, ok := <-inA:
        if !ok {
            inA = nil    // ← inA 关了, 把它置 nil, 下次循环不再选它
            continue
        }
        handle(v)
    case v, ok := <-inB:
        if !ok {
            inB = nil
            continue
        }
        handle(v)
    case <-done:
        return
    }
    if inA == nil && inB == nil {
        return   // 全关了, 退出
    }
}
```

**避坑**：如果不置 nil，关闭的 channel 会**反复返回零值** → 死循环。

### 动态启停某个 case

```go
var outCh chan Result  // 初始为 nil, 即"暂不允许输出"

select {
case r := <-resultCh:
    pending = r
    outCh = realOutCh   // 有数据了, 启用输出 case
case outCh <- pending:
    outCh = nil          // 输出完了, 禁用回去 (没数据时不该被选)
}
```

这是 **"用 nil 当开关"** 的经典 Go 模式。

---

## 七、time.After 的陷阱

`time.After(d)` 每次调用都创建**一个新 timer + 一个新 channel**：

```go
// ❌ 高频循环里持续泄漏 timer
for {
    select {
    case <-time.After(time.Second):  // 每秒一个新 timer!
        ...
    case <-quit:
        return
    }
}
```

每次循环都创建一个新 timer，**旧 timer 要等到触发或被 GC 才释放**——在高频循环里堆积大量 timer。

**修法 A：用 `time.NewTimer` 复用**

```go
timer := time.NewTimer(time.Second)
defer timer.Stop()

for {
    select {
    case <-timer.C:
        ...
        timer.Reset(time.Second)
    case <-quit:
        return
    }
}
```

**修法 B：用 `context.WithTimeout`**

```go
ctx, cancel := context.WithTimeout(ctx, time.Second)
defer cancel()

select {
case x := <-ch:
    ...
case <-ctx.Done():
    return ctx.Err()
}
```

> **Go 1.23 起的好消息**：`time.After` 的 timer 现在可以提前 GC（不再需要等触发），所以"泄漏 timer"问题大幅缓解。但 **NewTimer + Reset 仍然是更省内存的写法**——一次性场景用 time.After，循环里仍推荐复用。

---

## 八、常见模式合集

### 模式 1：超时

```go
select {
case v := <-ch:
    use(v)
case <-time.After(time.Second):
    return errors.New("timeout")
}
```

### 模式 2：可取消的阻塞读

```go
select {
case v := <-ch:
    use(v)
case <-ctx.Done():
    return ctx.Err()
}
```

context 取消是 Go 里的"标准取消信号"，几乎所有阻塞操作都该带这个 case。

### 模式 3：非阻塞读 / 写

```go
// 非阻塞读
select {
case v := <-ch:
    use(v)
default:
    // 没数据, 立刻返回
}

// 非阻塞写
select {
case ch <- v:
    // 写成功
default:
    // 缓冲满了, 丢弃 / 走 fallback
}
```

### 模式 4：优雅退出

```go
func worker(done <-chan struct{}, tasks <-chan Task) {
    for {
        select {
        case t := <-tasks:
            process(t)
        case <-done:
            return
        }
    }
}

// 主程序:
close(done)   // 广播退出信号
```

### 模式 5：fan-in（多源合并）

```go
func merge(a, b <-chan int) <-chan int {
    out := make(chan int)
    go func() {
        defer close(out)
        for {
            select {
            case v, ok := <-a:
                if !ok { a = nil; continue }
                out <- v
            case v, ok := <-b:
                if !ok { b = nil; continue }
                out <- v
            }
            if a == nil && b == nil {
                return
            }
        }
    }()
    return out
}
```

### 模式 6：信号广播 + 多 channel 限速

```go
select {
case <-rateLimiter.C:    // 限流器允许
    select {
    case <-stop:          // 但同时可能要退出
        return
    case work <- task:    // 投递任务
    }
case <-stop:
    return
}
```

嵌套 select 实现 "**先等许可，再处理 + 仍可取消**"。

## 九、一图总结

```
                     select 关键字
                          │
                          ▼
                  编译器静态展开为
                  runtime.selectgo 调用
                          │
                          ▼
              ┌────────── selectgo ───────────┐
              │                                │
              │ ① 随机化 polling order         │ ← 防饥饿
              │ ② 按地址排序 lock order        │ ← 防死锁
              │ ③ 锁住所有 channel             │
              │                                │
              │ ④ 第一轮: 非阻塞扫描 (fast)     │
              │      任一就绪 → 完成, 解锁返回  │
              │                                │
              │ ⑤ 有 default? → 解锁走 default  │
              │                                │
              │ ⑥ 第二阶段 (slow):              │
              │    给每个 case 一个 sudog       │
              │    挂到所有 channel 等待队列    │
              │    解锁, gopark                 │
              │                                │
              │ ⑦ 被唤醒:                       │
              │    从其它队列摘下兄弟 sudog     │
              │    返回选中的 case              │
              └────────────────────────────────┘

   关键设计:
   - 随机化:    保证多 case 就绪时的公平
   - 地址排序锁: 同一组 channel 的多 G select 不死锁
   - default:   触发"快路径短路", 实现非阻塞
   - nil ch:    永远不就绪 → 临时禁用 case
   - sudog 兄弟链: 任一唤醒后能反向清理其它队列

   实战陷阱:
   - time.After 在高频循环里泄漏 → 用 NewTimer/Reset
   - 关闭的 channel 会一直返回零值 → 置 nil 禁用
   - 没 default 时所有 channel 都是 nil → 永远阻塞
```

**一句话**：select 是 **"多 channel 等待"的语言级原语**——一次随机化非阻塞扫描（fast path）+ 把 G 同时挂到 N 个等待队列（slow path），任一就绪都能精准唤醒并清理。**随机化防饥饿、地址排序锁防死锁、sudog 兄弟链清理**，三个机制撑起了 Go 并发原语里最优雅的一块设计。
