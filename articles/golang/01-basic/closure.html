# 闭包 & 变量捕获的坑

## 一、闭包是什么

**闭包（closure）= 函数 + 它捕获的外层变量**。

```go
func makeCounter() func() int {
    count := 0
    return func() int {
        count++
        return count
    }
}

c := makeCounter()
fmt.Println(c())  // 1
fmt.Println(c())  // 2
fmt.Println(c())  // 3
```

返回的匿名函数**记住了 count 这个变量**——外层 `makeCounter` 已经结束，但 count **依然活着**（被闭包捕获）。

---

## 二、底层：闭包按"引用"捕获，不是按"值"

Go 闭包**捕获的是变量本身**（变量地址），不是变量在那一刻的值。

```go
x := 1
f := func() int { return x }
x = 100
fmt.Println(f())   // 100, 不是 1!
```

闭包内的 `x` 和外部的 `x` 是**同一个变量**——改一处，另一处看得到。

### 编译器实际怎么做

```go
func outer() func() int {
    x := 1
    return func() int { return x }
}
```

编译器生成的伪代码：

```
1. x 被闭包捕获 → 逃逸到堆 (栈上的 outer 已经返回了)
2. 闭包结构: { funcPtr, capturedX: *int }
3. 调用闭包时: load capturedX → 读取 x
```

→ 闭包本身在堆上，捕获的变量也跟着到堆——详见 [逃逸根因 ④](../02-advanced/escape-analysis.html)。

---

## 三、for + 闭包：最经典的踩坑

### 坑（Go 1.21 及之前）

```go
// ❌ Go 1.21-
for i := 0; i < 3; i++ {
    go func() {
        fmt.Println(i)
    }()
}
// 输出: 3 3 3  (不是 0 1 2!)
```

**为什么**？

```
循环变量 i 是同一个变量 (循环内复用)
   ↓
三个闭包都捕获了同一个 i
   ↓
go func 异步执行, 等 goroutine 跑起来时
i 已经变成 3 (循环结束)
   ↓
三个闭包读到的都是 3
```

### Go 1.21 及之前的两种修法

```go
// 修法 1: 入参拷贝 (传值)
for i := 0; i < 3; i++ {
    go func(i int) {       // 函数参数 i 是局部变量, 每次调用独立
        fmt.Println(i)
    }(i)                    // 立即传值
}

// 修法 2: 循环内重新声明 (每轮新变量)
for i := 0; i < 3; i++ {
    i := i                  // 创建新的局部 i, 遮蔽循环变量
    go func() {
        fmt.Println(i)
    }()
}
```

### Go 1.22+ 自动修复

Go 1.22 改了规则——**`for` 的循环变量每轮都是新变量**：

```go
// ✓ Go 1.22+
for i := 0; i < 3; i++ {
    go func() {
        fmt.Println(i)     // 0, 1, 2 (顺序不定)
    }()
}
```

⚠️ 注意：

- 需要 `go.mod` 里写 `go 1.22` 或更高
- **老项目升级前仍踩**

## 四、defer + 闭包的微妙差异

```go
// 情况 A: defer 普通函数调用 — 参数立即求值
for i := 0; i < 3; i++ {
    defer fmt.Println(i)   // 0, 1, 2 (defer 注册时 i 就被快照了)
}

// 情况 B: defer 闭包 — 闭包按引用捕获
for i := 0; i < 3; i++ {
    defer func() {
        fmt.Println(i)     // Go 1.21-: 3 3 3
                            // Go 1.22+: 2 1 0 (每轮新 i + LIFO)
    }()
}
```

| | 求值时机 | 1.21 行为 | 1.22+ 行为 |
|---|---|---|---|
| `defer f(i)` | 注册时立即求值 | 0,1,2 (LIFO 出栈) → 2,1,0 | 同左 |
| `defer func(){ f(i) }()` | 执行时读引用 | **3,3,3** | 2,1,0 |

→ 参见 [defer 坑 3 + 坑 4](../02-advanced/defer.html)。

## 五、闭包共享同一组变量

多个闭包**捕获同一个变量**时，它们共享状态：

```go
func make() (func(), func() int) {
    count := 0
    inc := func() { count++ }
    get := func() int { return count }
    return inc, get
}

inc, get := make()
inc(); inc(); inc()
fmt.Println(get())   // 3
```

`inc` 和 `get` 共享同一个 count——可以做"封装状态"的模式（替代 OOP 的私有字段）。

---

## 六、闭包的性能代价

| 维度 | 开销 |
|---|---|
| **闭包对象本身** | 一次堆分配（捕获变量逃逸） |
| **变量访问** | 跟读全局变量差不多（间接） |
| **GC 压力** | 闭包活着，捕获的变量也活着 — 可能拖累 GC |

### 实战影响

```go
// ❌ 高频路径滥用闭包
for i := 0; i < 1000000; i++ {
    process(func() int { return i * 2 })   // 每轮分配一个闭包
}

// ✓ 提前算好或用普通函数
for i := 0; i < 1000000; i++ {
    process(i * 2)
}
```

**hot path 上每次创建闭包 = 每次堆分配**——big cost。

---

## 七、闭包是不是 goroutine-safe

**不是**——闭包没有自带同步：

```go
counter := 0
for i := 0; i < 100; i++ {
    go func() {
        counter++           // ❌ data race!
    }()
}
```

闭包捕获的变量是**共享内存**——多 goroutine 同时读写仍要加锁 / 用 `atomic`：

```go
var counter atomic.Int64
for i := 0; i < 100; i++ {
    go func() {
        counter.Add(1)      // ✓
    }()
}
```

## 八、闭包的几个实战模式

### 模式 1：状态封装（替代 struct）

```go
func newRateLimiter(maxQPS int) func() bool {
    bucket := maxQPS
    tick := time.NewTicker(time.Second).C
    return func() bool {
        select {
        case <-tick: bucket = maxQPS
        default:
        }
        if bucket > 0 { bucket--; return true }
        return false
    }
}
```

### 模式 2：装饰器 / 中间件

```go
func withLog(f func()) func() {
    return func() {
        log.Println("before")
        f()
        log.Println("after")
    }
}

decorated := withLog(originalFunc)
```

### 模式 3：延迟执行 + 上下文

```go
defer func() {
    log.Printf("took %v", time.Since(start))
}()
```

### 模式 4：函数式选项（functional options）

```go
type Option func(*Server)

func WithPort(p int) Option { return func(s *Server) { s.port = p } }
func WithTLS(c *tls.Config) Option { return func(s *Server) { s.tls = c } }

func NewServer(opts ...Option) *Server {
    s := &Server{...}
    for _, opt := range opts { opt(s) }
    return s
}

s := NewServer(WithPort(8080), WithTLS(cfg))
```

→ 闭包让 Go 优雅实现"可选配置"。

## 九、一图总结

```
            Go 闭包 = 函数 + 捕获的外层变量
                          │
                  按"引用"捕获 (不是按值!)
                          │
        ┌─────────────────┴─────────────────┐
        ▼                                   ▼
     底层实现                            常见坑
     ① 捕获的变量逃逸到堆                ❌ for + 闭包: 1.21 前都打印 3,3,3
     ② 闭包对象本身在堆 ({funcPtr, vars}) ❌ defer 闭包 vs defer 函数调用 行为不同
     ③ 跟变量是引用关系,改一处另一处见   ❌ 多 goroutine 共享闭包变量 → race
                                       ❌ hot path 创建闭包 → 反复堆分配

     Go 1.22 修复:
        for 循环变量每轮独立 → 闭包坑消失 (需 go 1.22+ in go.mod)

     实战模式:
        ✅ 状态封装 (替代小 struct)
        ✅ 装饰器 / 中间件
        ✅ 函数式选项 (functional options)
        ✅ defer cleanup
```

**一句话**：闭包 = **函数 + 它按引用捕获的外层变量**——捕获的变量逃逸到堆，多个闭包共享同一变量改一处另一处见。**for + 闭包是 1.21 及之前最经典的坑**（都打印 3），用入参拷贝或 `i := i` 修；**Go 1.22 把循环变量改成每轮独立**这个坑消失。**defer 闭包 vs defer 函数调用**行为不同（引用 vs 快照），**hot path 别滥用闭包**（每次堆分配）。
