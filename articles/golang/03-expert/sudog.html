# sudog：goroutine 阻塞/唤醒的通用节点

> channel、select、Mutex、RWMutex、WaitGroup、Cond 的阻塞机制，底层全靠它。读懂 sudog，这些同步原语就串成一条线了。
>
> 前置：G 怎么睡(`gopark`)、怎么被唤醒(`goready`)、`_Gwaiting` 状态 → [GPM 调度器](gpm-scheduler.html)

## 一、一句话定位

`sudog`（**s**ynchronization **u**ndo **g**oroutine）：

> **代表"某个 G 正在某个同步对象上等待"的一个队列节点。**

G 是本体，sudog 是它派出去**排队的"分身 / 号码牌"**——本体睡大觉(`_Gwaiting`)，分身替它在等待队列里占位；谁先就绪就靠分身把本体叫醒。

---

## 二、核心原理：G 和同步对象是「多对多」

很多人以为 sudog 存在是因为"G 结构体太大、塞不进队列"。那只是**次要好处**。真正的根本原因，runtime 源码注释写得很清楚：

```text
// sudog is necessary because the g ↔ synchronization object
// relationship is many-to-many.
```

拆成两个方向：

### ① 一个 G 同时等多个对象（1 个 G → 多个 sudog）

最典型的就是 `select`：

```go
select {
case <-ch1:   // 同时挂在 ch1 的等待队列
case <-ch2:   // 同时挂在 ch2 的等待队列
case <-ch3:   // 同时挂在 ch3 的等待队列
}
```

这**一个 G** 同时趴在 ch1、ch2、ch3 三条等待队列上。而 G 结构体里**只有一对 `next/prev` 指针**——一个节点在链表里只能占一个位置，**不可能同时存在于三条链表的不同位置**。这就是死结。

### ② 一个对象上排着多个 G（1 个对象 → 多个 sudog）

一把锁、一个 channel 上可能有几百个 G 在等，它们串成一条 sudog 链表。

> 所以 sudog 是 **G 与同步对象之间的"连接节点 / 中间层"**，专门解开这个多对多。

---

## 三、图解：从"问题"到"怎么解"

### 图 1：问题——G 自己只有一对指针，塞不进多个队列

```text
            G (一个 goroutine)
        ┌───────────────────────┐
        │  next ──→ ?            │   ← 只有这一对指针
        │  prev ──→ ?            │
        └───────────────────────┘

select 里同时等 3 个 channel:

   ch1 的等待队列: [ ? ] ←─┐
   ch2 的等待队列: [ ? ] ←─┼─ G 得同时在这 3 条队列里
   ch3 的等待队列: [ ? ] ←─┘

   ✗ 矛盾: 一对 next/prev 不可能同时指向 3 条链表的不同位置!
```

### 图 2：解法——sudog 当"分身"，本体睡觉

```text
                          G (本体只有一个, _Gwaiting 睡着)
                          ▲ ▲ ▲
                 g 指针   │ │ │   每个 sudog 都记着"我代表这个 G"
              ┌──────────┘ │ └──────────┐
              │            │            │
        ┌─────┴────┐ ┌─────┴────┐ ┌─────┴────┐
        │ sudog_a  │ │ sudog_b  │ │ sudog_c  │   ← 3 个分身, 各带自己的 next/prev
        └─────┬────┘ └─────┬────┘ └─────┬────┘
              │            │            │
              ▼            ▼            ▼
   ch1.recvq:[sudog_a]  ch2.recvq:[sudog_b]  ch3.recvq:[sudog_c]
```

谁先就绪 → **撤销其余分身**（名字里 "undo" 的由来）：

```text
ch2 来数据了:
   ① 通过 ch2 队列里的 sudog_b 找到 g 指针 → 唤醒 G
   ② 把 sudog_a 从 ch1 队列摘掉  ┐
   ③ 把 sudog_c 从 ch3 队列摘掉  ┘ ← 撤销(undo)其它分身
   ④ 三个 sudog 全部回收进池子
```

### 图 3：反方向——一个 channel 上排着多个 G

```text
   100 个 G 都在 <-ch, channel 空, 全部排队:

   ch.recvq (一条 sudog 链表):

   head
    │
    ▼
  ┌────────┐  next   ┌────────┐  next   ┌────────┐
  │sudog_1 │ ──────→ │sudog_2 │ ──────→ │sudog_3 │ ─→ ...
  │ g:G1   │ ←────── │ g:G2   │ ←────── │ g:G3   │
  │ elem:&x│  prev   │ elem:&y│  prev   │ elem:&z│
  └────────┘         └────────┘         └────────┘
      │                  │                  │
      ▼                  ▼                  ▼
     G1(睡)            G2(睡)            G3(睡)

   有人 ch <- v 时: 从 head 摘下 sudog_1 → 把 v 拷进
                   sudog_1.elem 指向的地址 → 唤醒 G1。
```

### 叠起来 = 多对多

```text
   G 这边               sudog 层(连接节点)          对象这边
  ─────────           ────────────────          ─────────────
   G1 ──┬──→ sudog ───────────────────────→ ch1.recvq
        └──→ sudog ──┐                       (G1 在 select 等 ch1+ch2)
                     └─────────────────────→ ch2.recvq
   G2 ──────→ sudog ───────────────────────→ ch2.recvq
                                              (ch2 上排着 G1、G2 两个)
```

---

## 四、结构体长什么样

```go
type sudog struct {
    g *g            // 我代表哪个 G

    next *sudog     // 同一对象等待队列里的前后节点
    prev *sudog
    elem unsafe.Pointer  // 数据槽: channel 发送的值 / 接收的目标地址

    acquiretime int64    // 入队时间戳 → Mutex 饥饿模式判 >1ms 靠它
    releasetime int64
    ticket      uint32

    isSelect bool        // 是不是 select 里的(影响唤醒逻辑)
    success  bool        // channel 是正常收发, 还是被 close 唤醒的

    parent   *sudog      // 信号量 treap / Cond 链表用
    waitlink *sudog
    waittail *sudog
    c        *hchan      // 关联的 channel
}
```

注意它带了 `elem`(数据)、`acquiretime`(时间)、`success`(唤醒原因)——**sudog 不只是排队凭证，还顺便当了 G 之间传数据、传状态的载体**。

---

## 五、用在哪些地方

凡是 goroutine 要"阻塞等待某个条件"，背后几乎都是 sudog：

| 场景 | sudog 挂在哪 | elem 装什么 |
|---|---|---|
| **channel 发送** `ch <- v` | hchan 的 `sendq` | 待发送的值 |
| **channel 接收** `<-ch` | hchan 的 `recvq` | 接收目标的地址 |
| **select** | 多个 hchan 队列 | 同上，`isSelect=true` |
| **sync.Mutex / RWMutex** | `semtable[&sema]` | — |
| **sync.WaitGroup.Wait** | 信号量等待队列 | — |
| **sync.Cond.Wait** | 用 `waitlink` 串成通知链表 | — |
| **底层 semaphore** | `semroot` 的 treap | — |

> 相关篇目：[Channel 底层实现](../../channel/internals.html) · [select 怎么工作](../../channel/select.html) · [sync.Mutex 原理](../02-advanced/sync-mutex.html) · [sync.WaitGroup & Once](../02-advanced/sync-waitgroup-once.html)
>
> 锁场景里 `semtable[&sema]` 的具体结构（全局表 → 哈希桶 → treap → waitlink，sudog 到底排在哪）→ 见 [sync.Mutex 第七节](../02-advanced/sync-mutex.html)。

---

## 六、生命周期：acquire → park → ready → release

```text
   G 拿不到锁 / channel 没就绪
        │
        ▼
   ① acquireSudog()          从池子拿一个 sudog
        │                    填上 { g: 当前G, acquiretime: 现在 }
        ▼
   ② 挂进等待队列             串到 ch.recvq / semtable[&sema] / ...
        │
        ▼
   ③ gopark()                G → _Gwaiting, M 解绑去跑别的 G
        │
        ░░░ 睡眠中 ░░░
        │
        ▼   (别人 send / Unlock / Broadcast)
   ④ 从队列摘下 sudog         取出 sudog.g
        │
        ▼
   ⑤ goready(g)              G → _Grunnable, 回 P 队列等调度
        │
        ▼
   ⑥ releaseSudog()          sudog 还回池子, 复用
```

---

## 七、性能关键：sudog 是池化复用的

高并发收发场景下，如果每次等待都 `new(sudog)`、用完丢给 GC，会制造海量小垃圾。所以 runtime 用**两级缓存池**复用，跟 GMP 模型贴合：

```text
acquireSudog():  先从 P.sudogcache(本地, 无锁)拿
                 本地空了 → 从全局 sched.sudogcache 批量搬一批过来

releaseSudog():  先还回 P.sudogcache(本地)
                 本地满了 → 批量还一半给全局
```

- **本地优先、无锁**：绝大多数 acquire/release 只动 per-P 缓存，不抢全局锁。
- **批量搬运**：本地和全局之间一次搬一批，摊薄锁开销。
- 这套思路和 [sync.Pool](../02-advanced/sync-pool.html)、[内存分配器 mcache/mcentral](memory-allocator.html) 是**同一个套路**：per-P 本地缓存 + 中心仓库，减少锁竞争。

---

## 八、一图总结

```text
   sudog = "某个 G 正等在某个同步对象上" 这件事的实体化节点

   存在根因: G ↔ 同步对象 是【多对多】
     ├─ 1 个 G 能同时等多个对象 (select)  → 1 G 多 sudog
     └─ 1 个对象上排多个 G                → 1 对象 多 sudog
     而 G 自身只有一对 next/prev, 不够分

   双重身份:
     ├─ 排队节点 (next/prev 串进等待队列)
     └─ 数据/状态载体 (elem 传值, acquiretime 计时, success 记唤醒原因)

   生命周期:
     acquireSudog → 挂队列 → gopark(睡)
                  → 摘队列 → goready(醒) → releaseSudog

   高频零分配:
     per-P 本地缓存(无锁) + 全局中心池, 批量搬运
     —— 同 sync.Pool / mcache-mcentral 套路

   覆盖范围:
     channel / select / Mutex / RWMutex / WaitGroup / Cond
     —— 全靠这一个节点
```

**一句话**：`sudog` 是 **G 派出去排队的分身**，本质是为了解开 **G ↔ 同步对象的多对多**(一个 G 能同时等多个 channel，一个 channel 能被多个 G 等)，G 自身一对 `next/prev` 不够用。它既是**排队节点**又是**数据/状态载体**，并通过 **per-P 池化复用**做到高频创建几乎零分配。channel、Mutex、WaitGroup、Cond、select 的阻塞机制全建立在它之上。
