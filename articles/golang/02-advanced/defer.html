# Defer 是怎么实现的？

## 一、defer 是干嘛用的

**defer = "挂个钩子，函数返回前自动跑"**。

主要解决：函数可能从多个地方 return，每条路径都得手动收尾（关文件、解锁、释放连接），**漏一个就资源泄漏**。defer 让你**只写一次**收尾代码，runtime 保证它一定会跑。

类比其它语言：

| 语言 | 等价机制 | 作用域 |
|---|---|---|
| Java / C# | `try-finally` | 块 |
| Python | `with` / `try-finally` | 块 |
| C++ | RAII（析构函数） | 作用域结束 |
| **Go** | **`defer`** | **函数** ✱ |

✱ defer 写在哪一行都行，只在**函数 return 时**才跑——比 finally 灵活。

**怎么理解**："在函数任何地方写一句 `defer xxx()`，runtime 都会记住它，等整个函数返回时统一跑"——你不用像 try-finally 那样必须把代码块"圈起来"。

---

## 二、核心语义三件套

defer 所有坑都来自这三条语义没记牢。先死磕这一节，后面所有问题都迎刃而解。

### ① LIFO：后注册的先跑

```go
func f() {
    defer A()    // 第 1 个,最后跑
    defer B()    // 第 2 个,中间跑
    defer C()    // 第 3 个,最先跑
}
// 跑的顺序: C → B → A
```

**为什么是 LIFO**：资源通常嵌套获取，反序释放才正确——`open → lock → conn` 的反序就是 `conn → unlock → close`。

### ② 参数是"快照"，闭包是"引用"

这是新手最爱踩的坑。两段代码对照：

```go
// 快照: 注册时立刻拷贝参数
i := 0
defer fmt.Println(i)            // 这里 i=0 被快照
i = 1
// 输出: 0
```

```go
// 引用: 闭包按引用捕获,执行时再读
i := 0
defer func() { fmt.Println(i) }()  // 闭包捕获 i 的地址
i = 1
// 输出: 1
```

记忆口诀：

```
defer f(x)              → x 立即求值 (快照)
defer func(){ f(x) }()  → x 延迟求值 (用执行时的值)
```

想要"快照"直接传参，想要"延迟"就套闭包。

### ③ 能改命名返回值（必须命名）

```go
func f() (result int) {
    defer func() { result++ }()
    return 1
}
// 返回 2,不是 1
```

为什么？因为 `return 1` 其实分三步：

```
1. result = 1            ← 赋值给命名返回值
2. 执行所有 defer        ← defer 能看到、能改 result
3. 真正返回 result        ← 此时 result 已经是 2
```

**匿名返回值改不了**——`return result` 在步骤 1 就把值拷出去了：

```go
func g() int {
    result := 0
    defer func() { result++ }()
    return result
}
// 返回 0  (defer 改的是局部变量,跟返回值已经无关)
```

**最常用场景：统一包装错误**

```go
func doWork() (err error) {
    defer func() {
        if err != nil {
            err = fmt.Errorf("doWork: %w", err)
        }
    }()

    if err := step1(); err != nil { return err }  // err 被自动包装
    if err := step2(); err != nil { return err }  // 同上
    return nil
}
```

## 三、底层模型：`g._defer` 链表

每个被注册的 defer 在运行时是一个 `_defer` 结构（关键字段）：

```go
type _defer struct {
    fn      *funcval  // 要调用的函数
    sp, pc  uintptr   // 注册时的栈帧位置
    _panic  *_panic   // 关联的 panic (recover 用)
    link    *_defer   // 下一个节点
}
```

每个 goroutine 的 `g` 结构里有个 `_defer` 字段，指向链表头：

```
g (当前 goroutine)
 │
 └─ _defer ──→ [defer 3] ──→ [defer 2] ──→ [defer 1] ──→ nil
                (最新)                     (最早)

   注册 defer    = 往链表头插一个节点
   函数 return   = 从链表头开始顺序执行
                  → 天然 LIFO ✓
```

这是 defer 行为的**底层骨架**。三代演化只是在变"节点放哪 + 要不要真的建链表"。

---

## 四、三代实现演化

| 代 | Go 版本 | 节点在哪 | 走 runtime? | 相对开销 | 核心 insight |
|---|---|---|---|---|---|
| 1 堆链表 | ≤ 1.12 | 堆 (mallocgc) | 是 | **~10×** | 最朴素，最慢 |
| 2 栈链表 | 1.13 | 函数栈帧 | 是 | **~7×** | `_defer` 寿命不过函数，没必要上堆 |
| 3 开放编码 | 1.14+ | **不要节点** | **否** | **~1×** | 编译期直接展开成普通调用 |

> 第 3 代是**当前默认实现**，下面详细讲它。

---

## 五、开放编码详解（当前默认）

核心思路：**编译期能确定的 defer，直接展开成普通函数调用**，根本不进 runtime、不上链表。

### 编译后大致长这样

原代码：

```go
func f() {
    defer cleanup1()
    defer cleanup2()
    doWork()
}
```

编译器生成的伪代码：

```go
func f() {
    var deferBits uint8 = 0        // ← 8 位 bitmap

    deferBits |= 1 << 0            // 注册 cleanup1
    deferBits |= 1 << 1            // 注册 cleanup2

    doWork()

    // 函数 epilogue: 倒序检查每一位 (LIFO)
    if deferBits & (1<<1) != 0 { cleanup2() }
    if deferBits & (1<<0) != 0 { cleanup1() }
}
```

**全是直接调用 + 几个 bit 操作 → ≈ 直接调用的开销**。

### 为什么需要 `deferBits`

因为 defer 可能写在 `if` 里，编译期不知道运行时会不会真的注册：

```go
if cond {
    defer cleanup()    // 只在 cond=true 时该跑
}
// epilogue 看 deferBits 对应位判断:
//   置位 = 跑过 defer 语句 → 需要 cleanup()
//   未置 = 没跑过         → 跳过
```

`deferBits` 就是这个**"运行时实际注册了哪些"**的标记。

### 三条限制

不是所有 defer 都能用开放编码：

1. 函数里 defer 总数 **≤ 8**（deferBits 只有 8 位）
2. defer **不在循环里**（数量动态，无法编译期展开）
3. 没破坏静态分析的特性（极少见，比如某些 reflect 用法）

**不满足时降级**：
- 一般不满足 → 第 2 代（栈链表），~7× 开销
- 在循环里 → 第 1 代（堆链表），~10× 开销

### panic 时会临时降级回链表

开放编码版本的 defer 没有 `_defer` 节点，**panic 怎么走链表？**

答：runtime 在发生 panic 时，会**临时为这个函数建一个 `_defer` 节点链**，然后按链表方式执行——这样 `recover()` 仍然能找到 panic 并截住。

> 也就是说：**正常 return 走快路径（开放编码），panic 时走慢路径（链表）**。两套机制无缝切换。

## 六、坑的根因总结（先记这个）

defer 有 7 个常见坑（下一节列详细示例），但**它们其实只有 5 个根因**。记根因比死记 7 个坑省事得多——遇到新写法，对照根因表就能推导出"会不会踩"。

### 5 大根因表

| 根因 | 一句话本质 | 衍生的坑（下节示例） |
|---|---|---|
| **① 作用域 = 函数级（不是块级）** | `for { }` / `if { }` 的花括号**不算** defer 的作用域；defer 永远等到所在 `func` return 才跑 | 坑 1（循环里 defer） |
| **② 参数立即求值，闭包按引用** | `defer f(x)` 中 x 是**快照**；`defer func(){...x...}()` 中 x 是**引用** | 坑 3（for + 闭包）、坑 4（time.Since 计时）、坑 7（值方法 receiver） |
| **③ defer 链是 goroutine-local** | `g._defer` 挂在 g 上，每个 goroutine 自己一条，互不可见 | 坑 5（跨 goroutine 截不住 panic） |
| **④ recover 只在 runtime 跑 defer 链时有效** | `g.panic` 状态只在执行 defer 链的窗口里打开；其它时刻 `recover()` 都返 nil | 坑 2（recover 必须在 defer 里） |
| **⑤ defer 走 Go runtime 的退出路径** | runtime 在函数 return 时才跑 defer；绕过 runtime（OS 直接退出）就跳过 | 坑 6（os.Exit 跳过 defer） |

### 3 大类（再压一层）

```
              defer 坑的 3 大根本
                      │
        ┌─────────────┼─────────────┐
        ▼             ▼             ▼
     时间错位      空间隔离      作用域错位
                                     │
                                     └─ ① 块级 ≠ func 级

     时间错位:
       ② 参数立即求值 vs 闭包延迟求值
       ④ recover 的 panic 状态只在执行 defer 链时打开

     空间隔离:
       ③ defer 链跟 goroutine 绑定 (g._defer 是 goroutine-local)
       ⑤ defer 跟 Go runtime 绑定 (绕过 runtime 就跳过)
```

### 5 个自检问题（写 defer 时过一遍）

下次看到一个 defer 写法，**问自己 5 个问题**，所有坑都能在写的时候避开：

```
Q1: 这个 defer 写在 for/if 里, 但作用域是不是真的我想的那样?     (根因 ①)
Q2: defer 的参数会不会在我注册时就求值了, 跟我想的时机不同?     (根因 ②)
Q3: 这个 defer 想保护的是当前 goroutine 还是别的 goroutine?      (根因 ③)
Q4: recover 是不是直接写在 defer 挂的函数里?                     (根因 ④)
Q5: 程序会不会通过 os.Exit / log.Fatal 这种绕过 runtime 退出?    (根因 ⑤)
```

## 七、实战坑详细示例（按根因分组）

7 个坑按 5 大根因分组列出。每个根因先一句话点题，再看具体示例——这样案例不再是离散的"踩坑事故"，而是同一个原理的不同表现。

---

### 根因 ①：作用域 = 函数级（不是块级）

**一句话**：`for { }` / `if { }` 的花括号**不算** defer 的作用域。defer 永远等到所在 `func` return 才跑。

#### 示例：循环里 defer = 性能炸弹 + 资源占用过长

```go
// ❌ 灾难写法
func processAll(files []string) error {
    for _, path := range files {       // 10000 个文件
        f, _ := os.Open(path)
        defer f.Close()                 // ⚠️ 10000 个 defer 全压到函数末尾
        // ...
    }
    return nil
    // 这里才一次性关 10000 个文件 → fd 早就爆了
}
```

**两个问题**：
- **资源占用过长**：文件全开到函数结束才关 → fd 撑爆
- **走不了开放编码**（在循环里）→ 回退到堆分配 → 慢 10×

**修法：把循环体抽成内层函数**

```go
func processOne(path string) error {
    f, err := os.Open(path)
    if err != nil { return err }
    defer f.Close()      // 在 processOne 结束时关 ✓
    // ...
    return nil
}

for _, p := range files {
    if err := processOne(p); err != nil { return err }
}
```

或者最简单：**循环里别用 defer，显式 `f.Close()`**。

#### 为什么这一改就能解决问题

根本原因：**defer 的作用域是"函数级"，不是"块级"**——`for { }` 这对花括号**不算独立作用域**，里面的 defer 仍然属于外层函数，必须等外层 return 才跑。

两种写法的执行时间线对比：

```
❌ 旧版 (在外层 for 里 defer):
   时间 ──────────────────────────────────────►

   open 1     → 注册 defer1 (挂到链表)         ┐
   open 2     → 注册 defer2 (挂到链表)         │ 10000 个 defer
   ...                                          │ 全部积压
   open 10000 → 注册 defer10000 (挂到链表)     ┘ 文件全开着!

   doSomething()                              ← 此刻 10000 个 fd 占用
   return ──→ 触发 defer10000 → close 10000   ┐
              触发 defer9999  → close 9999    │ 在 return 这一瞬
              ...                              │ 才统一一个个跑完
              触发 defer1     → close 1       ┘
```

```
✓ 新版 (抽成 processOne):
   时间 ──────────────────────────────────────►

   processOne(1):
     open 1 → 注册 defer1 → ...用... → return → 跑 defer1 → close 1 ✓
                                                                       │
   processOne(2):                                  [前一个文件已关闭]
     open 2 → 注册 defer2 → ...用... → return → 跑 defer2 → close 2 ✓
                                                                       │
   ...                                             [总是只有 1 个开着]

   processOne(10000):
     open 10000 → ... → return → close 10000

   processAll return  ← 没有积压的 defer
```

**两个问题同时解决**：

| 问题 | 旧版（for 里 defer） | 新版（抽 processOne） |
|---|---|---|
| **资源生命周期** | 撑到 `processAll` 结束（同时占 10000 个 fd） | 每个 `processOne` 返回时立刻释放（同时只占 1 个 fd） |
| **defer 性能** | 在循环里 + 数量爆炸 → 回退堆分配链表（~10× 慢） | 每个 `processOne` 只有 1 个 defer → 走开放编码（~1×） |

**精确理解**（你的直觉的升级版）：

| 模糊说法 | 精确说法 |
|---|---|
| "旧版一次性执行 10000 个 defer" | 旧版**把所有 defer 推迟到外层 return 那一刻才统一处理**（逐个跑，但触发时刻是同一个） |
| "新版一个一个执行" | 新版**每次循环就完成一次完整的"注册→执行"回合**，从此再无积压 |

**类比**：

```
旧版 = 一次性还 10000 笔账   (积压到最后才结清)
新版 = 用完一笔就结一笔账    (即时清算,永远不欠)
```

**关键洞察**：**抽成内层函数 = 人为创造一个新的 func 作用域**。defer 认 `func` 不认 `{}`，所以这种"包一层"的手法正是给 defer 提前触发的唯一办法（除了不用 defer）。

### 根因 ②：参数立即求值，闭包按引用

**一句话**：`defer f(x)` 中的 `x` 在**注册那一刻就求值并拷贝**；只有写在闭包内引用的变量才是**延迟读取**。同一根因衍生出三个最容易踩的坑——下面三个示例本质上是同一件事。

记忆口诀：

```
defer f(x)              → x 立即求值 (快照)
defer func(){ f(x) }()  → x 延迟求值 (用执行时的值)
```

#### 示例一：for + 闭包 + defer = 变量捕获经典坑

```go
// ❌ Go 1.21 及之前会踩
for i := 0; i < 3; i++ {
    defer func() { fmt.Println(i) }()
}
// 输出: 3 3 3   (都是循环结束时的 i)
```

闭包捕获的是 `i` 的**引用**——三个 defer 在函数 return 时执行，那一刻 `i = 3`。

**修法**：传参（参数立即求值，变快照）

```go
// ✓
for i := 0; i < 3; i++ {
    defer func(v int) { fmt.Println(v) }(i)   // 传参 → 每个 defer 拿到自己的快照
}
// 输出: 2 1 0
```

> Go 1.22+ 改了 `for i := range ...` 的变量作用域（每轮独立变量），但**经典 `for i := 0; i < N; i++` 风格仍然踩**。

#### 示例二：`defer log(time.Since(start))` 计时陷阱

实战最容易踩，一不留神性能监控写假了：

```go
// ❌
func work() {
    start := time.Now()
    defer log.Printf("耗时 %v", time.Since(start))   // 这一行 time.Since(start) 立刻被算出来!
    // ... 100 行业务 ...
}
// 输出: 耗时 0s   (start 没问题, 但 time.Since(start) 在 defer 注册时就求值了)
```

`time.Since(start)` 是 defer 的**参数**，**立即求值**——那一刻业务还没跑，差值当然约等于 0。

**修法**：套闭包（延迟求值）

```go
// ✓
defer func() {
    log.Printf("耗时 %v", time.Since(start))   // 闭包内, return 时才求值
}()
```

#### 示例三：方法值的 receiver 是定型快照

```go
// ❌
type Counter struct{ n int }
func (c Counter) Print() { fmt.Println(c.n) }   // 值方法

c := Counter{n: 1}
defer c.Print()          // 此时 c 的值 (n=1) 已经快照了!
c.n = 100
// 输出: 1   (不是 100)
```

值方法的 receiver **等同于函数参数**，立即求值并拷贝一份。

**修法 A**：套闭包

```go
// ✓
defer func() { c.Print() }()   // 闭包延迟, 读到 n=100
```

**修法 B**：用指针方法

```go
// ✓
func (c *Counter) Print() { ... }
defer c.Print()    // c.Print() 等于 (&c).Print(), receiver 是指针,后续修改可见
```

---

### 根因 ③：defer 链是 goroutine-local

**一句话**：`g._defer` 链挂在 `g` 上，**每个 goroutine 自己一条**，互不可见。一个 goroutine 的 defer 拦不住另一个 goroutine 的 panic。

#### 示例：defer 截不住别的 goroutine 的 panic

```go
// ❌
func f() {
    defer func() {
        if r := recover(); r != nil {
            log.Println("caught:", r)   // ← 截不住!
        }
    }()

    go func() {
        panic("oops")   // 新 goroutine 里的 panic
    }()

    time.Sleep(time.Second)
}
// 程序整个挂掉
```

**原因**：新启的 goroutine 有它自己的 `g`，外层 defer 看不到。

**修法**：每个 goroutine 自己负责自己的 recover

```go
// ✓
go func() {
    defer func() {
        if r := recover(); r != nil {
            log.Println("caught:", r)
        }
    }()
    panic("oops")
}()
```

> 常见生产事故：业务 handler 包了 recover，但启动的 worker / pipeline goroutine 没包 → 第一个 panic 整个服务挂。

---

### 根因 ④：recover 只在 runtime 跑 defer 链时有效

**一句话**：`g.panic` 状态只在 runtime 跑 defer 链的窗口里打开。**其它时刻调 `recover()` 都返回 nil**，没有任何效果。

#### 示例：recover 必须在 defer 函数里才有效

```go
// ❌ 错的
func bad() {
    recover()       // 返回 nil,完全没用
    panic("oops")   // 照样挂
}

// ✓ 对的
func good() {
    defer func() {
        if r := recover(); r != nil {
            log.Printf("recovered: %v", r)
        }
    }()
    panic("oops")   // 被截住,函数正常返回
}
```

**机制**：panic 发生时 runtime 顺着 `g._defer` 链表逐个执行 defer，每个 defer 都能调 `recover()` 截 panic。一旦截住，panic 流程停止。**非 defer 里调 recover() 直接返回 nil。**

##### 为什么必须在 defer 里？

很多人以为 `recover()` 是个"能截 panic 的咒语"——只要写上就能截住。**其实不是**。

**`recover()` 真正的工作机制**：

```
recover() {
    if 当前 goroutine 没在 panic 状态:
        return nil
    if 调用者不是被 panic 流程直接触发的 defer 函数:
        return nil
    取出 g.panic 里的值, 清掉 panic 状态, 返回这个值
}
```

关键是"**panic 状态**"这个东西：

- **平时**：goroutine 正常跑 → `g.panic == nil` → 没"panic 状态" → recover 返 nil
- **panic 发生时**：runtime 把 panic 值挂到 `g.panic` → "panic 状态"打开 → runtime 开始沿 `g._defer` 链表跑 defer → 在这段时间里 `g.panic` 非空 → defer 里的 `recover()` 才能读到
- **defer 跑完**：状态自动清掉

也就是说，**"panic 状态"这个窗口只在执行 defer 链的那段时间内打开**。其它时刻调 recover()，要么没状态可读（返 nil），要么"调用者身份检查"过不去（返 nil）。

##### 完整时间线

```
普通流程:
   func() ──→ recover() ──→ g.panic == nil ──→ return nil ❌

panic 流程:
   panic("oops")
        │
        ▼
   runtime 把 "oops" 挂到 g.panic ──→ 打开"panic 状态"
        │
        ▼
   runtime 沿 g._defer 链表逐个跑 defer:
   ┌─────────────────────────────────────────┐
   │  (这段时间内 g.panic 非空, 是"打开"窗口)  │
   │                                          │
   │   进 defer 函数 ──→ recover()            │
   │     ├ 检查 g.panic != nil ✓              │
   │     ├ 检查调用者是 defer 本身 ✓          │
   │     ├ 取出 "oops"                        │
   │     ├ 清空 g.panic    ← panic 被截住!    │
   │     └ 返回 "oops"                        │
   │                                          │
   └─────────────────────────────────────────┘
        │
        ▼
   g.panic == nil ──→ runtime 不再抛, 函数正常返回 ✓
```

##### 套一层也不行

```go
// ❌ 这样也截不住
func tryRecover() {
    if r := recover(); r != nil {
        log.Println("recovered:", r)
    }
}

func bad() {
    defer tryRecover()    // ← defer 调一个函数,函数里再调 recover
    panic("oops")         // 程序仍然挂掉,recover 失效
}
```

为什么？因为 recover 还做一个检查：**调用者必须是被 defer 直接触发的那个函数本身**，不能是它的子函数。

```go
// ✓ 必须直接写在 defer 挂的那个函数体里
defer func() {
    if r := recover(); r != nil { ... }
}()
```

##### 三种情况一张表

| 调用位置 | g.panic | 调用者是 defer? | recover 返回 |
|---|---|---|---|
| 普通函数体里调 | 空 | — | **nil** |
| panic 流程里调，但当前函数不是 defer 触发的（套了一层） | 非空 | 否 | **nil** |
| **panic 流程里、直接在 defer 函数体里调** | 非空 | 是 | **panic 值，并清空状态** ✓ |

##### 类比

```
panic       = 房子着火
defer       = 你提前布置好的"应急预案"
recover()   = 应急预案里的灭火器

只有当"预案被激活"(panic 触发 defer 链)的瞬间, 灭火器才有效
平时拿起灭火器对着没火的地方按 —— 什么都不会发生
```

##### 为什么 Go 这么设计

如果允许 recover 到处用：

1. **难以判断什么时候真的 recover 了**——recover 在没 panic 时也能"假装成功"
2. **失去结构化的错误处理**——任何函数都可能"突然吞掉 panic 不抛上去"
3. **代码不可读**——看不出哪里是异常处理点

强制 recover 必须在 defer 里的设计意图：**panic 的恢复点必须显式、就近声明出来**——defer 就是这个"声明"。看一段代码要不要管 panic，看它有没有挂 `defer + recover` 就知道。

---

### 根因 ⑤：defer 走 Go runtime 的退出路径

**一句话**：runtime 只在函数正常 return 时才跑 defer。**绕过 runtime（OS 直接退出）就跳过所有 defer**。

#### 示例：`os.Exit` 跳过所有 defer

```go
// ❌
func main() {
    defer fmt.Println("收尾")
    os.Exit(1)   // defer 不会跑!
}
// 没有任何输出
```

`os.Exit` 直接走 OS 退出系统调用，**绕开 Go runtime 的 defer 链**。

类似还有：

| 调用 | defer 会跑? | 备注 |
|---|---|---|
| `return` / 正常退出 | ✓ | 走 runtime,链表正常处理 |
| `panic(...)` 未被 recover | ✓ | runtime 仍会跑 defer 再 crash |
| `runtime.Goexit()` | ✓ | 只退出当前 goroutine,defer 会跑 |
| **`os.Exit(...)`** | **✗** | 直接 OS 退出 |
| **`log.Fatal*(...)`** | **✗** | 内部调用 os.Exit |

> 实战建议：需要清理资源的程序，**避免 `os.Exit` / `log.Fatal`**，改成 `return error` + 让 main 自然退出。

---

## 八、一图总结

```
                  defer 语义三件套
                        │
        ┌───────────────┼────────────────┐
        ▼               ▼                ▼
      LIFO           参数快照          可改命名
   (后注册先跑)   (闭包是引用,例外)     返回值
        │
        ▼
   底层: g._defer 链表 (注册插表头,return 从头跑)
        │
        ▼
   三代实现 (节点位置 / 是否走 runtime)
   ┌─────────────┬─────────────┬─────────────────┐
   │ 堆链表       │ 栈链表       │ 开放编码         │
   │ ≤1.12        │ 1.13         │ 1.14+ (默认)    │
   │ ~10×         │ ~7×          │ ~1× ≈ 直接调用  │
   └─────────────┴─────────────┴─────────────────┘
                                       │
                                       ▼
                       条件: ≤8 个 / 不在循环 / 静态可分析
                       panic 时临时降级回链表保证 recover 工作

                  两个实战坑
                       │
            ┌──────────┴──────────┐
            ▼                     ▼
       循环里 defer         recover 必须在 defer 函数里
       (性能 + fd 双爆)      (机制: 顺链表执行 defer 时 recover)
```

**一句话**：defer 是"函数返回前自动跑的钩子"，语义 = **LIFO + 参数快照 + 可改命名返回值**；底层是 `g._defer` 链表；Go 1.14+ 用**开放编码 + deferBits** 把开销降到接近 0；**循环里 defer 会降级到堆分配**，是唯一真正要避开的性能坑。
