# MySQL 主从复制原理

> 一句话：主从复制的本质是**把主库的 [binlog](logs.html) 传到从库再重放一遍**——主库的 **log dump 线程**把 binlog 推给从库，从库 **I/O 线程**收下来写进本地 **relay log（中继日志）**，从库 **SQL 线程**再读 relay log 把变更**重放**到自己的数据上。默认是**异步复制**（主不等从），所以会有**主从延迟**，也会丢"已提交但没传过去"的事务，更安全可用**半同步**或 **MGR**。

> 本文默认讨论 **MySQL InnoDB + 经典主从（异步/半同步）复制**，版本以 **MySQL 5.7 / 8.0** 为基准。复制的载体是日志，三大日志的分工见 [三大日志](logs.html)。

## 一、为什么要主从复制

单台 MySQL 既要扛读写、又是单点，主从复制是解决这些问题的基础设施：

| 目标 | 说明 |
|---|---|
| **读写分离** | 写走主库、读走多个从库，把读压力从主库摊开，提升整体吞吐（互联网业务读远多于写） |
| **高可用 / 故障切换** | 主库挂了，把某个从库提升为新主库（failover），对外继续提供服务 |
| **数据备份 / 异地容灾** | 从库是一份持续更新的实时副本，可在从库上做备份（不影响主库），也可放到异地机房做容灾 |
| **业务隔离** | 把报表、大查询、数据分析等重读操作放到专门的从库，避免拖垮线上主库 |

```text
                      ┌──────────────┐  写(INSERT/UPDATE/DELETE)
        应用 ─────────│   主库 Master │◀──────────────── 写请求
          │           └──────┬───────┘
          │       复制 binlog │  (一份数据，多份副本)
          │        ┌──────────┼──────────┐
          │        ▼          ▼          ▼
          │   ┌────────┐ ┌────────┐ ┌────────┐
          └──▶│从库 S1 │ │从库 S2 │ │从库 S3 │  读请求分摊到多个从库
   读(SELECT) └────────┘ └────────┘ └────────┘
```

## 二、复制的载体：基于 binlog

复制的核心载体是 **binlog（二进制日志）**——它是 **MySQL Server 层**的逻辑日志，记录了所有**修改数据 / 表结构**的操作（DML、DDL），是复制和按时间点恢复（PITR）的基础。

- binlog **只记录变更**（写操作），不记录 `SELECT`/`SHOW` 这类纯读。
- 它是 **Server 层**的日志，**所有存储引擎通用**；而 redo log 是 InnoDB 引擎层私有的、用于崩溃恢复，**不参与复制**。复制走的是 binlog，不是 redo log。
- 主库要能被复制，必须开启 binlog（`log_bin`）并设置唯一的 `server_id`；从库也要有自己唯一的 `server_id`。

> 三大日志（redo log / undo log / binlog）各自的职责与两阶段提交细节见 [三大日志](logs.html)。这里只需记住一句：**复制的数据来源是 binlog。**

## 三、三个核心线程（重点）

经典主从复制由**一个主库线程 + 两个从库线程**协作完成。这是面试必考的核心模型：

| 线程 | 位于 | 职责 |
|---|---|---|
| **log dump 线程**（binlog dump thread） | **主库** | 从库连上来后，主库为每个从库起一个 dump 线程，负责**读取本地 binlog 并推送给从库**的 I/O 线程 |
| **I/O 线程**（Slave I/O Thread） | **从库** | 连接主库、向 dump 线程**请求 / 接收 binlog**，把收到的内容**写入本地 relay log（中继日志）** |
| **SQL 线程**（Slave SQL Thread） | **从库** | 读取 relay log 里的事件，**解析并重放（replay）**，把变更真正应用到从库的数据上 |

```text
            主库 Master                              从库 Slave
   ┌──────────────────────────┐          ┌──────────────────────────────────┐
   │  客户端写入                │          │                                    │
   │      │                    │          │                                    │
   │      ▼                    │          │                                    │
   │  ┌─────────┐  ① 写        │          │                                    │
   │  │ binlog  │              │          │   ┌───────────┐   ② 拉取并接收      │
   │  └────┬────┘              │  binlog  │   │ I/O 线程  │◀─────────┐         │
   │       │ 读                │  网络传输 │   └─────┬─────┘          │         │
   │  ┌────▼──────────┐ ③ 推送 │═════════▶│         │ ④ 写            │         │
   │  │ log dump 线程 │────────┼──────────┼─────────┘                │         │
   │  └───────────────┘        │          │   ┌─────▼─────┐          │         │
   │   (每个从库一个 dump 线程) │          │   │ relay log │          │         │
   └──────────────────────────┘          │   └─────┬─────┘          │         │
                                          │         │ ⑤ 读          (反馈位点) │
                                          │   ┌─────▼─────┐                    │
                                          │   │ SQL 线程  │ ⑥ 重放→落到从库数据 │
                                          │   └───────────┘                    │
                                          └────────────────────────────────────┘
```

> 注意：**I/O 线程只负责"搬运 + 落 relay log"，不执行 SQL**；真正"干活"（重放）的是 **SQL 线程**。把这两个职责分开，是因为"接收"和"应用"速度可能不一致——收得快、放得慢，多出来的就先攒在 relay log 里。

## 四、完整流程（时序）

把三个线程串起来，一次写操作从主库传到从库生效的完整链路：

```text
 时间 →
 主库                     dump 线程            I/O 线程(从)         relay log(从)        SQL 线程(从)
  │
  │① 事务提交
  │  写入 binlog
  │     │
  │     │② dump 线程感知到新 binlog
  │     └──────────▶ 读取 binlog event
  │                     │③ 通过网络推送给从库 I/O 线程
  │                     └─────────────────────▶ 接收 event
  │                                                │④ 顺序写入 relay log
  │                                                └────────────────────▶ [event 落盘]
  │                                                                          │⑤ SQL 线程读取
  │                                                                          └──────────▶ 解析
  │                                                                                       │⑥ 重放
  │                                                                                       │ 应用到
  │                                                                                       ▼ 从库数据
 主从一致(延迟 = ②~⑥ 的耗时)
```

文字版六步：

1. 主库执行事务并提交，把变更写入 **binlog**。
2. 主库的 **dump 线程**感知到 binlog 有新内容，读取对应的 binlog event。
3. dump 线程通过网络把 event **推送**给从库的 **I/O 线程**（推送模式：从库注册后主库主动发，并非从库轮询）。
4. 从库 **I/O 线程**收到 event，**顺序写入本地 relay log**，并记录已经读到主库 binlog 的哪个位置（位点 / GTID）。
5. 从库 **SQL 线程**读取 relay log 中尚未应用的 event。
6. SQL 线程**解析并重放**这些 event，把变更真正写入从库的数据文件，从库追平主库。

> 关键点：**I/O 线程的进度（收到哪了）和 SQL 线程的进度（重放到哪了）是两个独立的位点**。`SHOW SLAVE STATUS`（8.0 也叫 `SHOW REPLICA STATUS`）里能看到这两个进度，`Seconds_Behind_Master` 大致反映 SQL 线程落后主库多少。

## 五、binlog 格式对复制的影响

binlog 有三种格式（`binlog_format`），直接决定复制是否会主从不一致：

| 格式 | 记录的内容 | 优点 | 缺点 / 风险 |
|---|---|---|---|
| **STATEMENT** | 记录**原始 SQL 语句** | 日志小、可读 | 含**不确定函数**时主从可能不一致：`NOW()`、`SYSDATE()`、`UUID()`、`RAND()`、`LAST_INSERT_ID()`，以及无序 `LIMIT` 更新等，在从库重放时算出的值/影响的行可能不同 |
| **ROW** | 记录**每一行被修改前后的具体值** | **最安全**，主从严格一致，不受不确定函数影响 | 体积大（一条 `UPDATE` 影响百万行就记百万行变更）；可读性差 |
| **MIXED** | 默认用 STATEMENT，遇到不确定 / 不安全语句**自动切换为 ROW** | 兼顾体积与安全 | 行为依赖 MySQL 的"是否安全"判断，不如纯 ROW 直观可控 |

```text
   同样执行:  UPDATE acc SET balance = NOW() WHERE id = 1;

   STATEMENT: 记 "UPDATE acc SET balance=NOW() ..."
              └─ 从库重放时 NOW() 是从库自己的时间 → 主从可能不一致 ✗
   ROW:       记 "id=1 这行: balance 从 X 变为 2026-06-12 10:00:00.123"
              └─ 从库照搬这个确定的值 → 主从必然一致 ✓
```

> **MySQL 8.0 默认 `binlog_format = ROW`**（5.7 也推荐 ROW）。生产环境基本统一用 ROW，正是为了避免 STATEMENT 的不确定性导致主从数据漂移。ROW 还可配合 `binlog_row_image=minimal` 缩小体积。

## 六、三种复制模式对比

按"主库提交时是否、以及多大程度上等待从库"，复制分三种：

| 模式 | 主库是否等从库 | 数据安全性 | 代价 / 特点 |
|---|---|---|---|
| **异步复制**（Async，**默认**） | **完全不等**，写完 binlog 立即返回客户端成功 | 最弱：主库刚提交还没传给从库就宕机，这些**已提交事务会丢失**，从库永远收不到 | 性能最好、延迟最低；绝大多数场景的默认选择 |
| **半同步复制**（Semi-Sync） | **至少等一个从库确认收到**（收到并写入 relay log）才返回成功 | 较强：保证已提交事务**至少存在于一个从库**，减少切换时丢数据 | 主库提交多一次"等 ACK"的网络往返，吞吐下降；需装插件 `rpl_semi_sync_*` |
| **组复制 MGR**（Group Replication） | 基于 **Paxos** 协议，多数派确认 | **强一致**，支持单主 / 多主，自动选主、自动剔除故障节点 | 部署 / 运维复杂，对网络要求高（一句话带过即可） |

```text
   异步:    主库 ─写binlog─▶ 立即回 OK ─ ─ ─(之后才慢慢传给从库)─ ─ ─▶ 从库
            ⚠ 回 OK 后主库挂 → 没传出去的已提交事务丢失

   半同步:  主库 ─写binlog─▶ 等 ≥1 个从库 ACK"我收到并写入 relay log 了" ─▶ 才回 OK
            ✓ 已提交事务至少落在一个从库，切换更安全(代价是多一次网络往返)
```

> 补充：半同步有两个时机（`rpl_semi_sync_master_wait_point`）——**`AFTER_SYNC`**（5.7+ 默认，写 binlog 后、引擎提交前就等 ACK，更安全，能避免"幻读式"丢数据）与 **`AFTER_COMMIT`**（提交后再等）。另外半同步在等待超时（`rpl_semi_sync_master_timeout`）后会**退化为异步**，并非永不丢数据，只是把丢数据窗口大幅缩小。

## 七、主从延迟：原因与解决

**主从延迟**指从库的数据落后主库（`Seconds_Behind_Master > 0`）。它几乎不可能完全消除，关键是理解原因和把它压到可接受范围。

### 7.1 原因

```text
   主库:  多个连接并发写  ===▶  binlog 是串行追加，但写入吞吐很高
   从库:  传统上 SQL 线程"单线程"重放 relay log
          ───────────────────────────────────────▶ 重放速度跟不上主库的写入速度
          → relay log 越积越多 → 延迟拉大
```

- **从库重放是瓶颈**：经典复制里 SQL 线程**单线程**串行重放，而主库是多线程并发写入，从库天然追不上。
- **大事务 / 大表 DDL**：一个事务改了几百万行、或一条耗时很久的 `ALTER TABLE`，必须在从库**完整重放一遍**，期间后续 event 全部排队。
- **从库压力大**：从库还要扛大量读查询，重放抢不到 CPU / IO 资源。
- **网络延迟 / 跨机房**：I/O 线程拉取 binlog 本身有传输延迟（通常较小）。
- **从库配置 / 锁等待**：从库缺索引导致重放某条 `UPDATE` 全表扫、或重放被从库上的查询锁阻塞。

### 7.2 解决

| 手段 | 说明 |
|---|---|
| **并行复制 MTS**（Multi-Threaded Slave） | 让从库**多线程并行重放**，是治本手段。MySQL 5.6 按库并行（粒度粗）；5.7 引入 **LOGICAL_CLOCK**（基于组提交，主库能并行提交的事务在从库也能并行重放）；8.0 进一步用 **WRITESET**，按"行是否冲突"判断可并行，并行度更高。配置 `slave_parallel_workers` / `slave_parallel_type=LOGICAL_CLOCK` |
| **拆大事务** | 把批量操作拆成小事务，避免单个大事务长时间占住从库重放 |
| **降低从库负载** | 把重读查询分散到更多从库，或专门留一个低负载从库给延迟敏感的业务 |
| **提升从库硬件 / 关掉非必要持久化** | 从库用更快的磁盘；非关键从库可放宽 `sync_binlog` / `innodb_flush_log_at_trx_commit` 换吞吐 |
| **关键读兜底** | 延迟敏感的读**直接走主库**，或用缓存兜底（见下一节） |

## 八、读写分离的坑：延迟导致读到旧数据

读写分离最经典的坑：**主从延迟下，刚在主库写完、立刻去从库读，读到的是更新前的旧值。**

```text
   t1: 用户在主库下单/改资料  → 写主库成功(binlog 已写)
   t2: 页面立刻刷新，读请求被路由到从库
   t3: 但此刻变更还没重放到从库(延迟)
       → 从库返回旧数据 → 用户感觉"我明明改了怎么没生效"
```

常见解法（按代价从低到高）：

| 方案 | 做法 | 适用 |
|---|---|---|
| **强一致读走主库** | 对"写后立刻读、必须看到最新值"的关键路径，**强制读主库**（如刚下单后查订单详情） | 最常用、最稳妥 |
| **缓存兜底** | 写主库的同时更新缓存，关键读先读缓存，绕开从库延迟 | 读多、能接受缓存一致性方案时 |
| **判断延迟再路由** | 监控从库 `Seconds_Behind_Master`，延迟过大时把读临时切回主库 | 中间件层统一处理 |
| **会话级别等待** | 用 GTID（`WAIT_FOR_EXECUTED_GTID_SET`）等从库追上指定事务再读 | 对一致性要求高、可接受额外等待 |

> 一句话：**"写后读"场景默认不要信任从库**。要么读主库，要么用缓存 / GTID 等待保证能读到刚写的值。

## 九、GTID 简介（5.6+）

**GTID（Global Transaction Identifier，全局事务 ID）** 是 MySQL **5.6** 引入的复制定位机制，用来替代传统的"binlog 文件名 + 位点（`MASTER_LOG_FILE` + `MASTER_LOG_POS`）"。

- 格式为 `source_id:transaction_id`，例如 `3E11FA47-71CA-11E1-9E33-C80AA9429562:23`——`source_id` 是产生该事务的实例 UUID，`transaction_id` 是该实例上递增的事务序号。
- **每个事务在整个复制拓扑里有唯一的 GTID**，且会随复制传播。从库记录"我已经执行过哪些 GTID 集合"（`gtid_executed`）。

```text
   传统位点:  从库要记 "我读到主库 mysql-bin.000123 的第 4567 字节"
              ⚠ 主库切换/binlog 文件名变了 → 位点要人工重新计算，易错

   GTID:      从库只需记 "这些 GTID 我已经执行过了"
              ✓ 故障切换时 CHANGE MASTER TO ... MASTER_AUTO_POSITION=1
                新主库自动算出该补发哪些 GTID → 不丢不重，切换简单
```

GTID 的核心价值：**故障切换（failover）和主从重新对齐时不用再手算位点**，由 MySQL 根据"已执行 GTID 集合"自动算出从哪继续，天然防止漏传 / 重复执行同一事务。

## 一句话总结

> **主从复制 = 把主库 [binlog](logs.html) 传给从库重放。** 三个线程：主库 **log dump 线程**推 binlog → 从库 **I/O 线程**收下写入 **relay log** → 从库 **SQL 线程**读 relay log **重放**到数据。binlog 用 **ROW** 格式最安全（避开 `NOW()`/`UUID()` 等不确定函数的主从不一致），8.0 默认 ROW。复制模式分**异步**（默认，主不等从，主挂会丢已提交事务）、**半同步**（等至少一个从库确认收到，更安全）、**MGR**（Paxos 多数派，强一致）。从库单线程重放 + 大事务 + 从库高负载导致**主从延迟**，靠**并行复制 MTS**、降负载、关键读走主库/缓存缓解；读写分离要小心"写后读从库读到旧数据"，强一致读走主库。**GTID（5.6+）** 用全局事务 ID 替代 binlog 文件名+位点，让故障切换更简单可靠。三大日志的分工见 [三大日志](logs.html)。
