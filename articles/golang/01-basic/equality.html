# == 能比较哪些类型？

## 一、可比 vs 不可比

Go 把类型分成 **"可比" 和 "不可比"** 两组——只有可比类型能用 `==`、`!=`，也只有可比类型能做 map key。

| 可比 ✅ | 不可比 ❌ |
|---|---|
| 数字 (int / float / complex) | **slice** |
| bool | **map** |
| string | **func** |
| 指针 | （包含上述任何一个的 struct） |
| chan | |
| **interface**（有特殊行为） | |
| **数组**（如果元素可比） | |
| **struct**（如果所有字段可比） | |

```go
[]int{1,2} == []int{1,2}   // ❌ 编译错: slice can only be compared to nil
m1 == m2                    // ❌ 编译错
f1 == f2                    // ❌ 编译错
```

只能跟 `nil` 比：

```go
var s []int
s == nil    // ✓
```

---

## 二、为什么 slice / map / func 不可比

### slice

```go
s1 := []int{1, 2, 3}
s2 := []int{1, 2, 3}
s1 == s2   // 什么含义?
```

歧义：

- 按 header 比？两个 slice 指向不同底层数组，肯定不等
- 按元素比？要 O(N) 遍历——**`==` 应该是 O(1) 的语义**

Go 团队选择**直接禁止**——避免歧义和性能陷阱。

### map

```go
m1 := map[string]int{"a": 1}
m2 := map[string]int{"a": 1}
m1 == m2   // 什么含义?
```

map 的 key 集合**顺序不固定**——比较语义复杂，性能不可控。同样**禁止**。

### func

两个函数值如何比？按代码地址？按捕获变量？语义不清——禁止。

→ Go 的设计原则：**`==` 必须是 O(1) 且语义明确**——不满足就不让用。

---

## 三、各类型的 `==` 语义

### 数字 / bool

按值比，没啥可说的。

### string

按**字节内容**比较：

```go
"hello" == "hello"   // true
```

底层是 `memcmp`——长度相等 + 字节相同。

### 指针

按**地址**比，不是按指向的值：

```go
a := 1
p1 := &a
p2 := &a
p1 == p2   // true (指向同一变量)

b := 1
p3 := &b
p1 == p3   // false (虽然 *p1 == *p3, 但地址不同)
```

### chan

按 **hchan 指针**比（chan 本质是 `*hchan`）：

```go
c1 := make(chan int)
c2 := c1
c1 == c2   // true (同一个 chan)
```

### 数组 `[N]T`（元素可比时）

**逐元素比较**——长度不同直接编译错：

```go
a := [3]int{1, 2, 3}
b := [3]int{1, 2, 3}
a == b      // true (元素全相等)

c := [4]int{1, 2, 3, 0}
a == c      // 编译错: 类型不同 ([3]int vs [4]int)
```

### struct（所有字段可比时）

**逐字段比较**——一个字段不可比，整个 struct 不可比：

```go
type Point struct {
    X, Y int
}

p1 := Point{1, 2}
p2 := Point{1, 2}
p1 == p2    // true

type Bad struct {
    Items []int   // slice, 不可比
}
var b1, b2 Bad
b1 == b2    // ❌ 编译错
```

⚠️ struct 字段任一不可比 → 整个 struct 不可比，**也不能做 map key**。

### interface（双重比较）

interface 比较 **`(类型, 值)` 两部分**都相等：

```go
var a any = 1
var b any = 1
a == b      // true (都是 int 1)

var c any = int32(1)
a == c      // false! (类型不同: int vs int32)
```

底层：

```
iface(a) == iface(b):
   a.type == b.type  (类型描述符指针相等) AND
   a 的实际值 == b 的实际值
```

**任一不等就 false**。

⚠️ **interface 值的类型必须可比**——否则**运行时 panic**：

```go
var a any = []int{1, 2}
var b any = []int{1, 2}
a == b      // panic: comparing uncomparable type []int
```

---

## 四、interface == nil 的经典坑

**Go 最常踩的坑**：

```go
func mayFail() error {
    var p *MyErr   // nil 指针
    return p        // 返回 error 接口
}

err := mayFail()
err == nil          // false! 不是 true!
```

**为什么**：interface 是 `(type, value)`——只有 **type 和 value 都为 nil 时**才等于 nil。

```
return p:
   error 接口 = (type: *MyErr, value: nil)
                  ↑
                 类型不为 nil!
   → err != nil
```

详见 [Interface 底层是怎么实现的](interface.html) 的"interface == nil 经典坑"那节。

---

## 五、不可比类型怎么"等比较"

### slice：用 `slices.Equal`

```go
import "slices"
slices.Equal([]int{1,2}, []int{1,2})    // true (Go 1.21+)
```

或者老版本：

```go
reflect.DeepEqual(s1, s2)    // 通用但慢
```

### map：用 `maps.Equal`

```go
import "maps"
maps.Equal(m1, m2)    // Go 1.21+
```

### 通用：`reflect.DeepEqual`

```go
reflect.DeepEqual(any1, any2)   // 递归比, 通用, 慢
```

适合**测试断言**——业务热路径不要用（reflect 慢 50×）。

---

## 六、可比性 vs map key

**map key 必须是可比类型**：

```go
m := map[string]int{}        // ✓ string 可比
m := map[*User]int{}          // ✓ 指针可比
m := map[[2]int]int{}         // ✓ 数组可比 (元素可比)
m := map[Point]int{}          // ✓ struct 字段全可比

m := map[[]int]int{}          // ❌ slice 不可比, 编译错
m := map[map[K]V]int{}        // ❌ map 不可比
m := map[func()]int{}         // ❌ func 不可比

type Bad struct{ Items []int }
m := map[Bad]int{}            // ❌ struct 字段不可比 → 整体不可比
```

→ **如果想用 slice / map / func 当 key**，先转成可比的形式（如序列化为 string）。

---

## 七、性能：`==` 的开销

| 类型 | 开销 |
|---|---|
| 数字 / bool / 指针 | 1 个 CPU 指令 |
| string | memcmp，O(N)（N = 字节数） |
| 数组 | O(N) 逐元素 |
| struct | O(字段数) 逐字段 |
| interface | 一次类型比较 + 一次值比较 |

**大数组 / 长 string 的 `==` 不便宜**——hot path 注意。

---

## 八、几个实战陷阱

### ① float NaN ≠ NaN

```go
nan := math.NaN()
nan == nan    // false! IEEE 754 规定 NaN 不等于自身
math.IsNaN(nan)   // true
```

→ float 比较小心 NaN。

### ② 不同数字类型不可比

```go
var a int = 1
var b int64 = 1
a == b    // ❌ 编译错: mismatched types int and int64
a == int(b)   // ✓ 显式转换
```

Go 不做隐式数字类型转换。

### ③ 自定义类型的 == 不可重载

```go
type Money struct {
    Amount   int64
    Currency string
}

m1 := Money{100, "USD"}
m2 := Money{100, "USD"}
m1 == m2     // ✓ 逐字段比, 这里 true

// 但你不能自定义 == 的语义
// (Go 没有 operator overloading)
// 想自定义"相等" → 写一个 Equal 方法
func (a Money) Equal(b Money) bool { ... }
```

---

## 九、一图总结

```
            == 可比性矩阵
                  │
        ┌─────────┴─────────┐
        ▼                   ▼
     可比 ✅              不可比 ❌
   ┌────────────┐       ┌────────────┐
   │ 数字        │       │ slice      │
   │ bool        │       │ map        │
   │ string      │       │ func       │
   │ 指针         │       │ 含上述的    │
   │ chan        │       │ struct     │
   │ 数组(可比)   │       └────────────┘
   │ struct(可比) │       (只能跟 nil 比)
   │ interface   │
   └────────────┘

   各类型语义:
     数字/bool:  按值
     string:    memcmp 按字节
     指针:       按地址 (不是指向的值!)
     chan:      按 hchan 地址
     数组:       逐元素
     struct:    逐字段
     interface: (类型, 值) 双比 — 任一不等即 false

   ★ 经典坑 ★
   interface == nil 只有 (type, value) 都 nil 才成立
   返回具体类型的 nil 指针 → 接口 != nil!

   不可比类型怎么等比:
     slice  → slices.Equal (Go 1.21+)
     map    → maps.Equal
     通用    → reflect.DeepEqual (慢)

   特殊:
     NaN != NaN (IEEE 754)
     不同数字类型不能比 (要显式转)
     不能重载 == (写 Equal 方法)

   map key:
     必须是可比类型!
     slice/map/func 不能做 key
```

**一句话**：可比类型 = 数字 / bool / string / 指针 / chan / 接口 / 元素可比的数组 / 字段全可比的 struct——**slice / map / func 永远不可比**（只能 == nil）。**interface 比的是 (类型, 值) 双 tag**，**任一不等就 false**；**返回 nil 具体指针时 interface != nil** 是 Go 最经典的坑。**不可比类型用 slices.Equal / maps.Equal / reflect.DeepEqual**——但 reflect 慢，hot path 慎用。
