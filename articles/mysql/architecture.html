# 一条 SQL 是怎么执行的？

> 一句话：MySQL 分**Server 层**和**存储引擎层**两层——一条 SQL 进来，先过 Server 层的**连接器**（建连接、查权限），再依次经**分析器**（词法+语法分析，看你想干嘛）、**优化器**（基于成本选索引、定 join 顺序，决定怎么干最快）、**执行器**（做权限校验、调存储引擎接口取数据）；真正的数据存取由下面的**存储引擎**（默认 InnoDB）完成；如果是 UPDATE，还会额外走 redo log / binlog 的**两阶段提交**保证崩溃一致。

> 本文默认讨论 **MySQL InnoDB 存储引擎**（默认引擎），版本以 **8.0** 为基准，涉及版本差异处会显式标注。相关：[InnoDB vs MyISAM 存储引擎](engines.html)、[三大日志](logs.html)、[事务与隔离级别](transaction.html)。

## 一、MySQL 的两层架构

MySQL 在逻辑上分为**两层**：上面是 **Server 层**，下面是 **存储引擎层**。Server 层包含了大多数核心功能（连接管理、SQL 解析、优化、执行、内置函数、所有跨引擎能力如存储过程/触发器/视图等）；存储引擎层只负责**数据的存取**，并且是**插件式、表级可选**的（同一个库里不同表可以用不同引擎）。

```text
                  客户端 (mysql / JDBC / 各语言驱动)
                         │  TCP 连接
   ═══════════════════════════════════════════════════════ Server 层
        ┌──────────────────────────────────────────────┐
        │  连接器   建立连接 / 鉴权 / 管理连接(长连接)    │
        ├──────────────────────────────────────────────┤
        │  查询缓存 (MySQL 8.0 已彻底移除,见第三节)        │
        ├──────────────────────────────────────────────┤
        │  分析器   词法分析 + 语法分析 → 解析树           │
        ├──────────────────────────────────────────────┤
        │  优化器   选索引 / 定 join 顺序 (基于成本)       │
        ├──────────────────────────────────────────────┤
        │  执行器   权限校验 → 逐行调用存储引擎接口         │
        └───────────────────────┬──────────────────────┘
                                │  引擎 API (读/写一行、加锁...)
   ═══════════════════════════════════════════════════════ 存储引擎层
        ┌──────────────────────────────────────────────┐
        │   InnoDB(默认) │ MyISAM │ Memory │ Archive ... │
        │   负责数据的存取、索引组织、事务/锁/日志(各引擎不同)│
        └───────────────────────┬──────────────────────┘
                                │
                          磁盘上的数据文件 (.ibd 等)
```

记忆钩子：**Server 层"懂 SQL、不存数据"，存储引擎层"存数据、不懂业务"**。索引、事务、行锁、redo/undo 这些都属于引擎层的能力，所以换引擎（如 MyISAM）这些能力就可能没有。

## 二、Server 层组件依次干了什么

一条语句进入 Server 层后，按下面的顺序流过四（在 8.0 之前是五）个组件：

| 顺序 | 组件 | 职责 |
|---|---|---|
| 1 | **连接器** Connector | 建立 TCP 连接、用户名/密码鉴权、取出该用户权限、管理连接（长/短连接、`wait_timeout`） |
| 2 | ~~查询缓存~~ Query Cache | 命中则直接返回结果（**8.0 已彻底移除**，见第三节） |
| 3 | **分析器** Parser | 词法分析（拆 token）+ 语法分析（建解析树、校验语法） |
| 4 | **优化器** Optimizer | 基于成本选用哪个索引、多表 join 的连接顺序、改写等价语句 |
| 5 | **执行器** Executor | 做表级权限校验，按优化器定的计划逐行调用存储引擎接口取/改数据 |

### 2.1 连接器：负责连接与权限

客户端先和连接器通过 **TCP** 握手，做用户名密码鉴权。鉴权通过后，连接器会从权限表里把这个用户拥有的权限**取出来缓存在这个连接里**——之后这条连接的所有操作都依赖此刻读到的权限（即便管理员中途改了权限，也要**重新建立连接**才生效）。

- 连接建立成功后若没有后续动作，处于 `Sleep` 状态；空闲超过 `wait_timeout`（默认 8 小时）会被自动断开。
- 推荐用**长连接**减少建连开销，但长连接累积的内存（如执行大查询占用的临时内存）只在连接断开时释放，可能导致内存涨高——可定期断开重连，或 5.7+ 用 `mysql_reset_connection` 重置连接状态。

### 2.2 分析器：词法 + 语法分析

分析器搞清楚"你到底要干什么"，分两步：

```text
词法分析: 把字符串切成有意义的 token
   "SELECT id FROM user WHERE age>20"
        → [SELECT] [id] [FROM] [user] [WHERE] [age] [>] [20]

语法分析: 按 SQL 语法规则把 token 组装成「解析树」,并校验语法是否合法
   写错关键字 / 少了括号 → 这里报 "You have an error in your SQL syntax"
```

### 2.3 优化器：决定"怎么执行最快"

一条语句可能有多种执行方式，优化器基于**成本估算**（要扫描的行数、是否回表、CPU/IO 代价等）挑一个它认为最优的执行计划，典型决策包括：

- 一张表上有多个索引时，**选用哪个索引**（甚至判断走全表扫描更划算）。
- 多表 join 时，**先扫哪张表、谁做驱动表**（连接顺序影响很大）。
- 等价改写，如把某些子查询改写成 join、条件下推等。

> 优化器是"基于成本"而非"必然最优"——它依赖统计信息估算，估错时可能选错索引，这也是 `EXPLAIN` 和 `FORCE INDEX` 存在的意义。索引相关细节见 [MySQL 索引原理](index.html)。

### 2.4 执行器：调存储引擎接口取数据

拿到执行计划后，执行器先做**权限校验**（检查这条连接对目标表有没有对应的查询/修改权限，没有就报错返回；注意这是真正"执行前"再次校验，与连接器阶段取权限是两回事），然后**逐行调用存储引擎提供的接口**（如"取满足条件的第一行""取下一行"）来读取或修改数据，最后把结果集返回给客户端。

```text
执行器  ──"取第一个满足 age>20 的行"──→  存储引擎(InnoDB)
        ←─────────── 返回一行 ──────────
        ──"取下一行"──→ ... 直到取完
        把结果集(或受影响行数)返回给客户端
```

## 三、查询缓存：为什么 8.0 把它彻底删了

在 **MySQL 5.7 及之前**存在「查询缓存」：把 SQL 文本当 key、结果集当 value 缓存起来，下次同样的 SQL 直接返回结果、跳过解析与执行。听起来很美，但实际**弊大于利**，所以 **MySQL 8.0 直接彻底移除**了这个功能（连相关参数都删了）。

废弃的原因：

```text
1) 失效太频繁: 缓存以「表」为粒度失效——只要一张表有任意一次写(增删改),
   这张表上所有查询缓存全部清空。写多读多的表 → 缓存几乎永远是冷的。

2) 命中率低且苛刻: 命中要求 SQL 文本「逐字节完全一致」(多个空格、大小写、
   注释不同都不算命中),还排斥含 NOW()/RAND() 等的语句。

3) 反成性能负担: 每条查询都要先算 hash 去查/维护缓存,在高并发下
   这块缓存本身成了「全局锁」级别的争用热点,得不偿失。
```

> 结论：对绝大多数 OLTP 场景查询缓存命中率极低却带来维护开销，因此 8.0 移除。需要缓存请在**应用层**用 Redis 等做（可控的失效策略、远比表级全清更精细）。

## 四、一条 SELECT 的完整流程

把上面串起来，以 `SELECT id, name FROM user WHERE age > 20;` 为例（MySQL 8.0、InnoDB）：

```text
   客户端
     │  SELECT id,name FROM user WHERE age>20;
     ▼
 ① 连接器     建立/复用连接 → 鉴权 → 取该用户权限
     │
     ▼
 (② 查询缓存)  8.0 已移除,直接跳过;5.7 及以前命中则在此直接返回
     │
     ▼
 ③ 分析器     词法分析切 token → 语法分析建解析树,校验语法/表列是否存在
     │
     ▼
 ④ 优化器     age 上有没有索引? 走索引还是全表? → 生成执行计划
     │
     ▼
 ⑤ 执行器     先校验对 user 表的 SELECT 权限
     │         按计划逐行调用 InnoDB 接口:
     │            "取第一个 age>20 的行" → 判断 → 命中放入结果集
     │            "取下一行" → ... 直到取完
     ▼
 ⑥ 存储引擎    InnoDB 从 B+ 树索引/数据页(命中 Buffer Pool 走内存,否则读磁盘)取行
     │
     ▼
   结果集返回客户端
```

要点：SELECT 走的是**快照读**（普通查询不加锁，靠 MVCC 读一致版本），这部分细节见 [事务与隔离级别](transaction.html)。

## 五、一条 UPDATE 的流程（多了日志与两阶段提交）

`UPDATE user SET name='tom' WHERE id=1;` 前半段和 SELECT 一样要过连接器、分析器、优化器、执行器；不同的是它要**修改数据**，于是在执行器调用引擎写数据的同时，InnoDB 还要写 **redo log** 和 **undo log**，Server 层要写 **binlog**，并用 **两阶段提交**把 redo log 与 binlog 绑定一致。

```text
 执行器 ─→ ① InnoDB 取出 id=1 这行(在 Buffer Pool 就用内存,否则读磁盘载入)
          ② 写 undo log(记录旧值,用于回滚 / MVCC 版本链)
          ③ 在内存(Buffer Pool)里把 name 改成 'tom' → 该页变「脏页」
          ④ 写 redo log,置为 prepare 状态  ───────────┐
                                                      │  两阶段
 Server ─→ ⑤ 写 binlog(归档/主从复制用)                │  提交(2PC)
          ⑥ 写 redo log,置为 commit 状态  ───────────┘
          (脏页随后由后台线程异步刷回磁盘数据文件)
```

为什么要 **两阶段提交（prepare → 写 binlog → commit）**？因为 redo log 是引擎层的、binlog 是 Server 层的，若不绑定，崩溃时可能"一个写了、另一个没写"，导致主库恢复后与从库（binlog 重放出来的）数据不一致。两阶段提交以"binlog 是否写成功"作为事务最终是否提交的依据，保证两份日志最终一致。

```text
   崩溃恢复判定:
     ├─ redo 已是 commit              → 直接提交
     ├─ redo 是 prepare 且 binlog 完整 → 提交(补 commit)
     └─ redo 是 prepare 但 binlog 残缺 → 回滚
```

> 这里只点到为止——redo / undo / binlog 三大日志的细节、WAL、两阶段提交的完整推导见 [三大日志](logs.html) 与 [事务与隔离级别](transaction.html)。

## 一句话总结

> MySQL 分 **Server 层 + 存储引擎层**。一条 SQL：① **连接器**建连接/鉴权/取权限 → ②（**查询缓存** 8.0 已彻底移除，因表级失效太频繁、命中率低、还成争用热点）→ ③ **分析器**做词法+语法分析建解析树 → ④ **优化器**基于成本选索引、定 join 顺序 → ⑤ **执行器**做权限校验并逐行调用存储引擎接口 → ⑥ **存储引擎**（默认 InnoDB）真正存取数据。**SELECT** 到此返回；**UPDATE** 还要写 undo/redo/binlog，并用 **两阶段提交（prepare→写 binlog→commit）** 保证 redo 与 binlog 一致、崩溃可恢复。延伸见 [InnoDB vs MyISAM 存储引擎](engines.html)、[三大日志](logs.html)、[事务与隔离级别](transaction.html)。
