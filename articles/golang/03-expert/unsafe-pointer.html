# unsafe.Pointer 6 条规则

> 一句话：unsafe.Pointer 能在指针类型间转换，但只有 6 种合法用法；用错就是未定义行为，GC 也可能搬走对象。

## 6 条规则（官方文档原话精简）

1. **`*T1 ↔ *T2`**（通过 unsafe.Pointer 中转）
2. **`uintptr ← unsafe.Pointer`**（看一下数值，不能反向）
3. **`unsafe.Pointer ← uintptr` 算偏移要立即用**：

   ```go
   p := unsafe.Pointer(uintptr(unsafe.Pointer(&s)) + offsetA)  // ✅
   // 不能拆成两行存 uintptr
   ```

4. **syscall.Syscall 接受 uintptr 参数**（编译器特殊处理保活）
5. **reflect.Value.Pointer / UnsafeAddr**（同上）
6. **reflect.SliceHeader / StringHeader**（已不推荐，1.20+ 用 unsafe.Slice/String/SliceData/StringData）

## 为什么 uintptr 不能存

GC 移动对象时只识别 unsafe.Pointer 类型；uintptr 在 GC 看来只是个数字，对象搬了 uintptr 还指向旧地址。

```go
// ❌ 错误
addr := uintptr(unsafe.Pointer(&x))
// GC 来了，x 可能搬家
y := *(*int)(unsafe.Pointer(addr))  // 野指针

// ✅ 算偏移要单语句完成
y := *(*int)(unsafe.Pointer(uintptr(unsafe.Pointer(&x)) + 8))
```

## 1.20+ 安全工具

```go
unsafe.Slice(p, n)        // ptr → []T，自动加保活
unsafe.SliceData(s)       // []T → ptr
unsafe.String(p, n)
unsafe.StringData(s)
```

## 何时不得不用

- 序列化（避免拷贝大 buffer）
- mmap 对接 C 结构
- 极端性能场景的 string ↔ []byte

## 一句话总结

> 6 条规则记牢，uintptr 不能跨语句存；1.20+ 的 unsafe.Slice / String 比手写更安全。
