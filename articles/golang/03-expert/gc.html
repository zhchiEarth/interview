# Go 的 GC 是怎么工作的？

> Go GC = **并发三色标记 + 混合写屏障 + 非分代 / 非移动** 的 mark-sweep。核心目标只有一个：**把 STW 压到亚毫秒，用一点吞吐换可预测的低延迟**。下面顺着「每一块为什么这么选」讲。

## 一、目标：为什么不能简单 stop-the-world

最朴素的 GC：暂停整个程序 → 找出不可达对象 → 清理。问题是 STW 到**百毫秒级**，在线服务不可接受。

Go 的目标是 **STW < 1ms**，所以必须**并发标记**——GC 和用户代码（mutator）同时跑。一条延迟演进线：

| 版本 | 关键改动 | STW |
|---|---|---|
| Go 1.3 | 标记并行、清扫并发 | 百毫秒 |
| Go 1.5 | 并发三色标记 | < 10ms |
| **Go 1.8** | **混合写屏障（免栈重扫）** | **亚毫秒** |

---

## 二、三色标记法（标记阶段的算法）

把对象分三种颜色：

| 颜色 | 含义 |
|---|---|
| **白** | 未访问，**回收候选**（标记结束还白 = 垃圾） |
| **灰** | 自己已访问，但**子对象还没扫完**（待处理队列） |
| **黑** | 自己 + 所有子对象都访问完，**存活，不再处理** |

```text
① 全部初始为白
② 从 root（栈、全局变量、寄存器）出发 → 标灰，入灰队列
③ 循环：从灰队列取一个 → 它指向的白对象全标灰 → 自己标黑
④ 灰队列空 → 标记结束 → 剩下的白对象就是垃圾
```

```text
对象图：root→A，A→B、A→C，B→D，E 无人引用(垃圾)
颜色：○白  ◐灰  ●黑

帧0 全白          ○A ○B ○C ○D   ○E    灰队列: []
帧1 扫 root：A 灰  ◐A ○B ○C ○D   ○E    队列: [A]
帧2 取A→子B C灰   ●A ◐B ◐C ○D   ○E    队列: [B,C]   (A 自己变黑)
帧3 取B→子D灰     ●A ●B ◐C ◐D   ○E    队列: [C,D]
帧4 取C(无子)     ●A ●B ●C ◐D   ○E    队列: [D]
帧5 取D(无子)     ●A ●B ●C ●D   ○E    队列: []  ← 空，标记结束
                                       E 始终白 → 垃圾，回收
```

**并发标记**：上面这个过程，用户 goroutine **同时还在跑**、还在改指针。麻烦就来了。

---

## 三、并发的麻烦：对象「漏标」+ 三色不变式

并发标记的根本风险——**把存活对象错当垃圾回收**（漏标）：

```text
GC：扫完 A，A 已是黑色（不会再看它）
用户：A.ptr = C      // 把白对象 C 挂到黑对象 A 下
用户：B.ptr = nil    // 同时删掉原来 B→C 这条唯一引用
GC 结束 → C 仍是白 → 被错误回收（但 A 还在用它！）💥
```

```text
        扫描完 A 之后（A 已黑，GC 不会再看它）

  改前：  [A●]              改后：  [A●]──────────┐ ①黑直接指白
            │                                     ▼
          [B◐]──>[C○]              [B●]   ✕     [C○]  C 只剩黑 A 指着
                 ↑被灰可达                  ②灰路径(B→C)被删

  两条同时断 → C 再没有"灰"能到达 → 标记结束仍白 → 被误删 💥
```

**漏标只在两个条件「同时」成立时发生**：

1. **黑对象指向了白对象**（A→C）
2. **该白对象失去了所有「从灰对象可达」的路径**（B→C 被删）

对应两条「三色不变式」，维护住任一条就不会漏：

- **强三色不变式**：黑对象**绝不**指向白对象 → 直接堵死条件 1
- **弱三色不变式**：黑可以指向白，但该白**必须仍能被某个灰对象可达**（被灰保护）→ 堵死条件 2

```text
  强三色不变式                弱三色不变式
   [黑]──✕──>[白]              [黑]─────>[白]   黑可指白，但…
   黑绝不指向白                       ↑
   (由插入屏障维护)             [灰]──┘  必须有"灰"能到它(被保护)
                              (由删除屏障维护)
```

→ 写屏障就是用来维护这两条不变式的。

---

## 四、写屏障：混合写屏障（Go 1.8）

**写屏障 = 指针赋值时，runtime 拦一下做点标记**（只拦堆指针写，栈写太频繁不拦）。两种经典屏障各维护一条不变式：

| 屏障 | 动作 | 维护 | 堵住 |
|---|---|---|---|
| **插入屏障 Dijkstra** | 新值标灰（`shade(ptr)`） | 强不变式 | 条件 1 |
| **删除屏障 Yuasa** | 旧值标灰（`shade(*slot)`） | 弱不变式 | 条件 2 |

Go 1.8 把两者合并成 **混合写屏障（hybrid write barrier）**：

```text
writePointer(slot, ptr):
    shade(*slot)              // 删除屏障：被覆盖的旧值标灰（Yuasa）
    if 当前 goroutine 栈还没扫描(灰):
        shade(ptr)            // 插入屏障：新写入的值标灰（Dijkstra）
    *slot = ptr
```

```text
        写 A.slot = C      （A 黑；A.slot 原值=X；新值=C）

  删除屏障  shade(旧值 X) → 把被覆盖的 X 标灰（覆盖前先救它）
  插入屏障  shade(新值 C) → 把新挂上的 C 标灰

  混合 = 两个都做：黑 A 即便指向白 C，C 此刻已是灰 → 一定会被扫到 → 不漏
```

> **关键收益（也是面试重点）**：混合屏障让**栈在标记开始时扫一次就变黑、整轮不用再回头重扫**。
> Go 1.8 之前只有插入屏障，栈写不挂屏障，所以**标记终止时要 STW 把所有栈重扫一遍**——这正是当年 STW 的大头。混合屏障消除了这次重扫，把 STW 干到了亚毫秒。

配套：标记期间**新分配的对象直接「分配为黑」**（allocated black），本轮不回收，避免刚生的对象被误扫。

## 五、GC 全流程：5 个阶段、2 次 STW

```text
                        ┌─ STW ①（亚毫秒）────────────┐
  ┌──────────────┐      │ Sweep Termination 收尾上轮清扫 │
  │ 触发 GC      │ ───► │ Mark Setup 开写屏障 + 扫 root  │
  └──────────────┘      └──────────────┬───────────────┘
                                       ▼
                        ┌─ 并发 Concurrent Mark ───────┐
                        │ GC 与用户代码同时跑           │
                        │ + 用户分配时被迫 mark assist  │
                        └──────────────┬───────────────┘
                                       ▼
                        ┌─ STW ②（亚毫秒）────────────┐
                        │ Mark Termination 关写屏障、   │
                        │ 收尾、算下一轮 pacing         │
                        └──────────────┬───────────────┘
                                       ▼
                        ┌─ 并发 Concurrent Sweep ──────┐
                        │ 按需 lazy 清扫白对象，         │
                        │ 内存还给 mcache/mcentral/mheap│
                        └──────────────────────────────┘
```

**只有两段 STW**：① GC 启动（sweep termination）② 标记终止（mark termination），各亚毫秒。中间的标记、清扫都和用户代码并发。

### 为什么开头的 Sweep Termination 要"收尾上一轮"？

很多人卡这：**这一轮 GC 刚开始，怎么要管上一轮的清扫？** 因为 **清扫是惰性的**——上轮标记完**不会一口气扫光**垃圾，而是拖着慢慢扫：

- **按需清扫**：某个 goroutine 要分配、需要一个 span 时，**顺手扫一个**（`sweepone`）再用；
- **后台清扫**：一个低优先级的 background sweeper goroutine 慢慢扫。

好处是把清扫成本**摊到分配时**，没有一次性大停顿；代价是——等下一轮 GC 触发，**上一轮可能还有 span 没扫完**。

而**清扫和标记复用同一份 span 位图**（清扫把存活标记 `gcmarkBits` 翻成下轮的 `allocBits`）→ **必须先扫完上一轮，才能开始新一轮标记**，否则位图状态会打架。这就是开头 `Sweep Termination` 干的事：

```text
第 N 轮:  Mark → MarkTerm ┃ Sweep（惰性，拖很久）························
                          ┃   分配时顺手扫 / 后台 sweeper 慢慢扫
                          ┃
  堆涨到目标，第 N+1 轮触发 ┃──────────►  但上轮 Sweep 还没扫完！
                                              │
                  ┌─ STW ① Sweep Termination ─┴─────────────┐
                  │ 先把上轮残留的 span 全部扫完，再开始本轮  │
                  └──────────────────┬───────────────────────┘
                                     ▼
                  第 N+1 轮  Mark Setup → Mark → …
```

> 一句话：**清扫惰性 + 标记/清扫共用 span 位图** → 新一轮必须先 `Sweep Termination` 把上轮扫干净，才能开标记。

---

## 六、怎么跟上分配速度：辅助标记 + Pacer

**问题**：并发标记时用户还在疯狂分配。若分配快过标记，堆会在标记完成前就涨爆 → 可能 OOM。光靠后台标记线程**不保证**追得上。Go 用两件事兜住——

- **Pacer（大脑）**：定**何时启动**标记、每字节该摊派多少标记工作（算 `assistRatio`）
- **辅助标记 assist（手脚）**：在每次分配时**按这个比率执行背压**——给分配踩刹车、并拉分配方来帮标记

### 6.1 辅助标记：一个「记账 / 信用」模型

铁律：**每分配 X 字节，就要有相应的标记工作被完成**。但"每次分配都立刻去标记"太慢，于是改成**记账**：

| 概念 | 含义 |
|---|---|
| `gcAssistBytes` | 该 goroutine 的**信用余额**（还能"免费"分配多少字节）|
| 分配 size | **花钱**：`gcAssistBytes -= size` |
| 做标记工作 | **赚钱**：扫一批对象 → 余额涨回来 |
| 余额 ≥ 0 | 有钱 → 分配**直接放行**（快路径，仅一次减法）|
| 余额 < 0 | **透支** → 先把欠的补上才能继续 |

透支后怎么补（**优先省力的**）：

```text
用户 goroutine 要 allocate(size)
   │  gcAssistBytes -= size
   ├─ 余额 ≥ 0 ？ ── 是 ──► 直接分配（99% 走这，零成本）
   └─ 否（透支）：
        ① 先从后台标记攒的"信用池"借 → 把余额拉回 ≥ 0（自己不干活）
        ② 池也空了 → 自己扫"正比于欠债"的标记活，扫够为止
        → 余额回正，分配才放行
```

**一个具体数字**（设 `assistRatio = 1`：分配 1B ≈ 要做 1 单位标记活）：

```text
余额起点 gcAssistBytes = 0
① 分配 100B   → 余额 = -100   透支了
② 信用池有 60 → 借 60         余额 = -40   （没自己干活）
③ 池空了      → 自己扫 40     余额 = 0
④ 分配完成，继续跑业务
（实际实现会顺手"多挣一点"存着，让接下来几次小分配免费）
```

记住三点：

- **配额正比于分配量**：分配越多 → 被摊派的标记越多（比率 `assistRatio` 由 Pacer 算）。
- **自平衡背压**：分配越凶 → 被迫标记越多 → 自己被拖慢 → 分配降速，同时推进了标记。**分配速度和标记速度被绑死** → 数学上保证标记能在堆到目标前完成。
- **快路径零成本**：绝大多数分配只是一次"余额 -= size"；真正的活大头由后台 worker 干、存进信用池，用户 goroutine 多数时候**借一下就过**，很少真被拉去标记。

> 类比：仓库一边盘点存货（标记）一边还在进货（分配）。规矩「**想进货，先帮着盘点等量的货**」——进得越猛、盘得越多，盘点永远不会被进货甩开。

### 6.2 GC Pacer：定节奏的大脑

- 根据**上一轮数据**估算**何时启动**标记，力求标记**恰好**在堆涨到目标前完成（启动早了浪费 CPU，晚了要靠 assist 猛踩刹车、伤延迟）。
- 算出 **`assistRatio`**（每分配 1 字节要做多少标记），喂给 6.1 的辅助标记执行。
- 目标由 **`GOGC`** 定：默认 100 = **存活堆翻倍**就触发下一轮。

> 一句话：**Pacer 是大脑（定节奏、算比率），assist 是手脚（按比率在每次分配时执行背压）。**

## 七、GC 的触发时机

```text
① 堆增长到 Pacer 目标       —— 主路径，受 GOGC 控制（默认存活×2）
② sysmon 每 2 分钟强制一次   —— 兜底，防长期不触发
③ runtime.GC() 手动          —— 测试/特殊场景，生产慎用
④ 逼近 GOMEMLIMIT（1.19+）   —— 软内存上限，临近会更激进地 GC
```

---

## 八、为什么「不分代」也「不压缩」

**不分代**（JVM / V8 都分代，Go 不）：

- Go 大量**栈分配 + 逃逸分析**，短命对象很多在栈上就回收了、根本不进堆 → 分代假设的收益被削弱
- 分代需要额外的「代际写屏障」和跨代记忆集，实现复杂、延迟不可预测
- Go 选「简单 + 可预测延迟」路线

**不压缩 / 不移动**（mark-sweep 而非 mark-compact）：

- 对象地址固定 → 指针不用改 → 和 cgo、`unsafe.Pointer` 天然兼容、写屏障也简单
- 碎片靠 **size-class 分配器**（mcache/mcentral/mheap，按大小分桶）控制，而不是靠移动

**代价**：吞吐略逊于分代 GC，但 Go 优先保延迟。

---

## 九、关键参数 & 调优实战

| 参数 / 工具 | 作用 |
|---|---|
| `GOGC`（默认 100） | 触发阈值。调大（如 200）→ GC 更少、更省 CPU，但内存占用更高 |
| `GOMEMLIMIT`（1.19+） | 软内存上限，防 OOM；常配 `GOGC=off` 用「纯内存上限」模式 |
| `GODEBUG=gctrace=1` | 每轮 GC 打印一行：耗时、STW、堆大小——调优第一手数据 |
| `runtime.GC()` | 手动触发（测试用） |

**降低 GC 压力的实战手段**（治本是「少在堆上分配」）：

- **减少逃逸**：小对象别返回指针、别塞进 `interface{}`（见 [逃逸分析](escape-analysis.html)）
- **复用对象**：高频大对象用 [sync.Pool](../02-advanced/sync-pool.html)
- **预分配**：slice/map 提前 `make` 足够容量，少触发扩容分配
- **调大 GOGC / 设 GOMEMLIMIT**：用内存换 GC 频率，或卡住上限防 OOM

---

## 十、必背数字 + 一句话总结

```text
3 种颜色（白/灰/黑）   2 条不变式（强/弱）   2 次 STW（启动 + 标记终止）
GOGC 默认 100（堆翻倍触发）   sysmon 2 分钟兜底   STW 亚毫秒（1.8 起）
```

> **Go GC = 并发三色标记 + 混合写屏障（插入 Dijkstra + 删除 Yuasa）+ 辅助标记 + 并发清扫**。
> 混合写屏障维护三色不变式、**消除标记终止时的栈重扫**，把 STW 压到亚毫秒；非分代/非移动换来实现简单与可预测延迟，靠**栈分配 + 逃逸分析**弥补不分代的劣势。**牺牲一点吞吐，换可预测的低延迟。**
